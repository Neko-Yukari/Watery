services:
  api:
    # 启用自动构建推送后，你可以直接使用镜像名
    # 请手动将其中的 <YOUR_GITHUB_USER> 替换为你的真实 GitHub 用户名
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-YOUR_GITHUB_USER}/watery:latest
    build:
      context: .
    container_name: watery_api
    ports:
      - "18000:18000"
    env_file:
      - .env
    depends_on:
      - clash
    volumes:
      - .:/app
      - ./data:/app/data
      - ./data/pdfs:/app/data/pdfs         # Phase 4: PDF 上传持久化存储
      - ./skills:/app/skills               # Phase 4: 生成技能目录持久化
      - ./data/outputs:/app/data/outputs   # Phase 5: ms-agent 任务输出（深度研究 / 代码生成）
      - ./projects:/app/projects           # Phase 5: ms-agent project 配置（深度研究 / 代码生成）
    command: uvicorn app.main:app --host 0.0.0.0 --port 18000 --reload
    restart: unless-stopped

  clash:
    image: metacubex/mihomo:latest
    container_name: watery_clash
    ports:
      - "7890:7890"  # HTTP/HTTPS Proxy
      - "7899:9090"  # REST API (Host 7899 -> Container 9090)
    volumes:
      - ./data/clash:/root/.config/mihomo
    restart: unless-stopped
