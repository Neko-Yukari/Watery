name: Docker Build & Push

on:
  push:
    branches: [ "main" ] # 仅在推送到 main 分支时触发
  workflow_dispatch:      # 允许手动触发构建

env:
  REGISTRY: ghcr.io
  # 镜像名称转小写（GitHub 库名含大写时必须转小写）
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. 设置 Docker Buildx（支持多架构构建和更强缓存）
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 2. 登录到 GitHub Container Registry
      - name: Log into registry ${{ env:REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 3. 提取元数据（标签、版本等）
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,format=short

      # 4. 构建并推送镜像
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ id.meta.outputs.tags }}
          labels: ${{ id.meta.outputs.labels }}
          # 核心优化：使用 GitHub Actions 的构建高速缓存
          cache-from: type=gha
          cache-to: type=gha,mode=max
