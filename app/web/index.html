<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watery AI Agent</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --sidebar-bg: #ffffff;
            --chat-bg: #ffffff;
            --task-bg: #f8f9fa;
            --text-primary: #333333;
            --text-secondary: #666666;
            --border-color: #e0e0e0;
            --primary-color: #1a73e8;
            --user-msg-bg: #e3f2fd;
            --ai-msg-bg: #f5f5f5;
            --pending-color: #ffc107;
            --running-color: #2196f3;
            --completed-color: #4caf50;
            --failed-color: #f44336;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* 左侧边栏 */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 20px;
            flex-shrink: 0;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 20px;
            text-align: center;
        }

        .new-chat-btn {
            width: 100%;
            padding: 10px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .new-chat-btn:hover {
            background-color: #1557b0;
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 20px;
        }

        /* 代理状态指示器 */
        .proxy-status-card {
            padding: 12px;
            background-color: #f8f9fa;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            margin-top: auto;
            font-size: 13px;
        }

        .proxy-status-card.error {
            border-color: #ff5252;
            background-color: #ffebee;
        }
        
        .proxy-status-card.initializing {
            border-color: #ffc107;
            background-color: #fff9c4;
        }

        .status-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 6px;
        }

        .status-dot.online { background-color: #4caf50; }
        .status-dot.offline { background-color: #ff5252; }
        .status-dot.warning { background-color: #ffc107; }

        .history-item {
            padding: 10px 12px;
            margin-bottom: 8px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: background-color 0.2s;
        }

        .history-item:hover {
            background-color: var(--bg-color);
        }

        .history-item.active {
            background-color: #e8f0fe;
            color: var(--primary-color);
            font-weight: 500;
        }

        .nav-item {
            padding: 12px 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
            font-weight: 500;
        }

        .nav-item:hover {
            background-color: var(--bg-color);
        }

        .nav-item.active {
            background-color: #e8f0fe;
            color: var(--primary-color);
        }

        .model-selector {
            margin-top: auto;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
        }

        .model-selector select {
            width: 100%;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            margin-top: 8px;
        }

        /* 模态框样式 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            width: 80%;
            max-width: 800px;
            height: 80%;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .modal-header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 18px;
            font-weight: bold;
        }
        .modal-close {
            cursor: pointer;
            background: none;
            border: none;
            font-size: 24px;
            color: var(--text-secondary);
        }
        .modal-body {
            padding: 20px;
            overflow-y: auto;
            flex: 1;
            font-size: 14px;
            line-height: 1.6;
        }
        .modal-body pre {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 6px;
            overflow-x: auto;
        }

        /* 主聊天区 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--chat-bg);
            border-right: 1px solid var(--border-color);
        }

        /* 任务看板 */
        .task-sidebar {
            width: 300px;
            background-color: var(--task-bg);
            display: flex;
            flex-direction: column;
            padding: 15px;
            flex-shrink: 0;
        }

        .task-header {
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .task-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .task-item {
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px;
            font-size: 13px;
            position: relative;
        }

        .task-status-tag {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            float: right;
            text-transform: uppercase;
            font-weight: bold;
        }

        .tag-pending { background-color: #fff8e1; color: #ffa000; }
        .tag-running { background-color: #e3f2fd; color: #1976d2; }
        .tag-completed { background-color: #e8f5e9; color: #388e3c; }
        .tag-failed { background-color: #ffebee; color: #d32f2f; }

        .task-desc {
            font-weight: 500;
            margin-bottom: 6px;
            display: block;
            margin-top: 5px;
            word-break: break-all;
        }

        .task-meta {
            color: var(--text-secondary);
            font-size: 11px;
        }

        /* 主聊天区 */
        .chat-header {
            height: 60px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            padding: 0 20px;
            font-size: 18px;
            font-weight: 600;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .message {
            max-width: 80%;
            padding: 15px;
            border-radius: 12px;
            line-height: 1.5;
        }

        .message.user {
            align-self: flex-end;
            background-color: var(--user-msg-bg);
            border-bottom-right-radius: 4px;
        }

        .message.assistant {
            align-self: flex-start;
            background-color: var(--ai-msg-bg);
            border-bottom-left-radius: 4px;
        }

        .chat-input-container {
            padding: 20px;
            border-top: 1px solid var(--border-color);
            background-color: var(--chat-bg);
        }

        .chat-input-wrapper {
            display: flex;
            gap: 10px;
            max-width: 800px;
            margin: 0 auto;
        }

        .chat-input {
            flex: 1;
            padding: 15px;
            border: 1px solid var(--border-color);
            border-radius: 24px;
            font-size: 16px;
            resize: none;
            outline: none;
            height: 54px;
            font-family: inherit;
        }

        .chat-input:focus {
            border-color: var(--primary-color);
        }

        .send-btn {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s;
        }

        .send-btn:hover {
            background-color: #1557b0;
        }

        .send-btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        /* ── 附件上传 UI ─────────────────────────────────────────── */
        .attach-btn {
            width: 42px;
            height: 54px;
            background: none;
            border: none;
            cursor: pointer;
            color: #aaa;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            flex-shrink: 0;
            transition: color 0.2s;
        }
        .attach-btn:hover { color: var(--primary-color); }

        .attachment-preview-area {
            max-width: 800px;
            margin: 0 auto 8px;
            display: none;
            flex-wrap: wrap;
            gap: 8px;
            padding: 4px 0;
        }

        .attachment-chip {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 8px 4px 6px;
            border-radius: 16px;
            border: 1px solid #dde2ea;
            background: #f5f7fa;
            font-size: 12px;
            max-width: 230px;
        }
        .attachment-chip img {
            width: 36px;
            height: 36px;
            object-fit: cover;
            border-radius: 6px;
            flex-shrink: 0;
        }
        .attachment-chip .chip-name {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 120px;
            color: #333;
        }
        .attachment-chip .chip-meta {
            color: #999;
            font-size: 11px;
            flex-shrink: 0;
        }
        .attachment-chip .chip-remove {
            cursor: pointer;
            color: #bbb;
            font-size: 16px;
            line-height: 1;
            background: none;
            border: none;
            padding: 0;
            flex-shrink: 0;
        }
        .attachment-chip .chip-remove:hover { color: #ff4d4f; }

        /* Markdown 样式简易支持 */
        .message pre {
            background-color: #2d2d2d;
            color: #ccc;
            padding: 10px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 10px 0;
        }
        .message code {
            font-family: monospace;
        }

        /* ── C-1: 工具调用卡片 ── */
        .tool-call-card {
            background: #f0f4ff;
            border-left: 3px solid #1a73e8;
            border-radius: 6px;
            padding: 8px 12px;
            margin: 6px 0;
            font-size: 12px;
        }
        .tool-call-card.error {
            border-left-color: #d32f2f;
            background: #fff0f0;
        }
        .tool-call-header {
            font-weight: 600;
            color: #1a73e8;
            margin-bottom: 4px;
        }
        .tool-call-card.error .tool-call-header {
            color: #d32f2f;
        }
        .tool-call-result {
            color: #555;
            word-break: break-all;
        }

        /* ── C-2: Tab 导航 ── */
        .tab-nav {
            display: flex;
            gap: 4px;
            padding: 6px 10px 0;
            border-bottom: 1px solid var(--border-color);
        }
        .tab-btn {
            flex: 1;
            padding: 5px 4px;
            border: 1px solid transparent;
            background: transparent;
            border-radius: 6px 6px 0 0;
            cursor: pointer;
            font-size: 11px;
            color: var(--text-secondary);
            transition: all 0.15s;
        }
        .tab-btn:hover { background: #f3f4f6; }
        .tab-btn.active {
            background: #e8f0fe;
            color: var(--primary-color);
            font-weight: 600;
            border-color: var(--border-color);
            border-bottom-color: #e8f0fe;
        }
        .tab-panel { display: none; flex: 1; overflow-y: auto; padding: 8px; flex-direction: column; gap: 6px; }
        .tab-panel.active { display: flex; }
        .panel-action-bar { display: flex; gap: 6px; margin-bottom: 6px; }
        .panel-action-bar button {
            flex: 1; padding: 5px; font-size: 12px;
            background: var(--primary-color); color: white;
            border: none; border-radius: 6px; cursor: pointer;
        }
        .research-card, .code-card {
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 8px 10px;
            font-size: 12px;
        }
        .research-card .rc-title, .code-card .rc-title {
            font-weight: 600; margin-bottom: 3px;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .rc-meta { color: var(--text-secondary); font-size: 11px; }
        .rc-status {
            display: inline-block; padding: 1px 6px;
            border-radius: 10px; font-size: 10px; font-weight: 600;
        }
        .rc-status.running { background: #fff3cd; color: #856404; }
        .rc-status.completed { background: #d4edda; color: #155724; }
        .rc-status.failed { background: #f8d7da; color: #721c24; }
        .rc-status.pending { background: #e2e3e5; color: #383d41; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">Watery AI</div>
        
        <button class="new-chat-btn" onclick="createNewChat()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            新对话
        </button>

        <div class="history-list" id="historyList">
            <!-- 历史对话列表将在这里动态生成 -->
        </div>

        <!-- 代理健康状态展示 -->
        <div id="proxyStatusCard" class="proxy-status-card" style="margin-bottom: 15px;">
            <div style="display: flex; align-items: center; justify-content: space-between;">
                <div>
                   <span id="proxyDot" class="status-dot warning"></span>
                   <span id="proxyText">检测代理中...</span>
                </div>
                <span id="proxyLatency" style="color: var(--text-secondary); font-size: 11px;">--ms</span>
            </div>
        </div>

        <div style="border-top: 1px solid var(--border-color); padding-top: 15px; margin-bottom: 15px;">
            <div class="nav-item" onclick="openModal('knowledge')">📚 知识库</div>
            <div class="nav-item" onclick="openModal('skills')">🛠️ 技能库</div>
            <div class="nav-item" onclick="openModal('errors')">📓 错题集</div>
            <div class="nav-item" onclick="openModal('settings')">⚙️ 设置</div>
        </div>

        <div class="model-selector">
            <label for="modelSelect">当前模型:</label>
            <select id="modelSelect">
                <option value="ark-code-latest">加载中...</option>
            </select>
        </div>
    </div>

    <div class="main-content">
        <div class="chat-header" style="display: flex; justify-content: space-between; align-items: center;">
            <div style="display: flex; align-items: center; gap: 10px;">
                <span id="chatTitle">新对话</span>
                <span id="intentionBadge" style="display: none; background: #e8f0fe; color: #1a73e8; font-size: 11px; padding: 2px 8px; border-radius: 10px;">任务模式</span>
            </div>
            <div>
                <button onclick="toggleIntentionMode()" id="intentionToggleBtn" style="margin-right: 10px; padding: 6px 12px; border-radius: 6px; border: 1px solid var(--primary-color); color: var(--primary-color); background: white; cursor: pointer; font-size: 13px;">切换任务模式</button>
                <button onclick="deleteCurrentChat()" style="padding: 6px 12px; border-radius: 6px; border: 1px solid #ff4d4f; color: #ff4d4f; background: white; cursor: pointer; font-size: 13px;">删除</button>
            </div>
        </div>
        
        <div class="chat-messages" id="chatMessages">
            <!-- 初始欢迎消息将由 JS 动态生成或从历史记录恢复 -->
        </div>

        <div class="chat-input-container">
            <!-- 附件预览区 -->
            <div id="attachmentPreviewArea" class="attachment-preview-area"></div>
            <!-- 输入行 -->
            <div class="chat-input-wrapper">
                <!-- 隐藏文件选择器（支持图片/PDF/文档/纯文本） -->
                <input type="file" id="fileAttachInput" multiple
                    accept="image/png,image/jpeg,image/gif,image/webp,.pdf,.docx,.txt,.md"
                    style="display:none" onchange="handleFileAttach(event)">
                <button class="attach-btn" onclick="document.getElementById('fileAttachInput').click()" title="上传图片或文件">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
                    </svg>
                </button>
                <textarea class="chat-input" id="userInput" placeholder="输入消息，可附加图片/PDF/文档..." rows="1" onkeydown="handleKeyDown(event)"></textarea>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <div class="task-sidebar">
        <div class="task-header">
            <span id="sidebarTitle">任务看板</span>
            <button onclick="refreshCurrentTab()" style="background: none; border: none; cursor: pointer; font-size: 16px;">🔄</button>
        </div>
        <!-- C-2: Tab 导航 -->
        <div class="tab-nav">
            <button class="tab-btn active" id="tab-tasks" onclick="switchTab('tasks')">📋 任务</button>
            <button class="tab-btn" id="tab-research" onclick="switchTab('research')">🔬 研究</button>
            <button class="tab-btn" id="tab-code" onclick="switchTab('code')">💻 代码</button>
        </div>
        <!-- 任务面板 -->
        <div class="tab-panel active" id="panel-tasks">
            <div class="task-list" id="taskList">
                <div style="text-align: center; color: var(--text-secondary); padding-top: 20px;">暂无进行中的任务</div>
            </div>
        </div>
        <!-- 研究面板 -->
        <div class="tab-panel" id="panel-research">
            <div class="panel-action-bar">
                <button onclick="showNewResearchForm()">＋ 新建研究</button>
                <button onclick="refreshResearch()" style="flex:0;padding:5px 8px;background:#6c757d;">🔄</button>
            </div>
            <div id="researchList"><div style="text-align:center;color:var(--text-secondary);padding-top:20px;">暂无研究任务</div></div>
        </div>
        <!-- 代码面板 -->
        <div class="tab-panel" id="panel-code">
            <div class="panel-action-bar">
                <button onclick="showNewCodeForm()">＋ 新建代码任务</button>
                <button onclick="refreshCode()" style="flex:0;padding:5px 8px;background:#6c757d;">🔄</button>
            </div>
            <div id="codeList"><div style="text-align:center;color:var(--text-secondary);padding-top:20px;">暂无代码任务</div></div>
        </div>
    </div>

    <!-- 模态框 -->
    <div class="modal-overlay" id="infoModal" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <span id="modalTitle">标题</span>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody">
                加载中...
            </div>
        </div>
    </div>

    <script>
        const chatMessages = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const modelSelect = document.getElementById('modelSelect');
        const historyList = document.getElementById('historyList');
        const chatTitle = document.getElementById('chatTitle');
        const taskList = document.getElementById('taskList');
        const intentionBadge = document.getElementById('intentionBadge');

        let isIntentionMode = false;

        // 模态框逻辑
        async function openModal(type) {
            const modal = document.getElementById('infoModal');
            const title = document.getElementById('modalTitle');
            const body = document.getElementById('modalBody');
            
            modal.style.display = 'flex';
            body.innerHTML = '加载中...';

            try {
                if (type === 'knowledge') {
                    title.textContent = '📚 知识库 (Markdown 文档)';
                    const res = await fetch('/api/v1/knowledge');
                    const data = await res.json();
                    body.innerHTML = `<ul>${data.knowledge_files.map(f => `<li>${f}</li>`).join('')}</ul><p style="margin-top:10px;color:gray;">(这些文件存储在项目根目录，作为 RAG 的基础知识)</p>`;
                } else if (type === 'skills') {
                    title.textContent = '🛠️ 技能库 (SQLite & ChromaDB)';
                    const res = await fetch('/api/v1/skills');
                    const data = await res.json();
                    if (data.skills && data.skills.length > 0) {
                        body.innerHTML = data.skills.map(s => `
                            <div style="border:1px solid #eee; padding:10px; margin-bottom:10px; border-radius:6px;">
                                <strong>${s.name}</strong> (${s.language})<br>
                                <span style="color:gray;font-size:12px;">ID: ${s.id} | Entry: ${s.entrypoint}</span>
                            </div>
                        `).join('');
                    } else {
                        body.innerHTML = '暂无注册的技能。';
                    }
                } else if (type === 'errors') {
                    title.textContent = '📓 错题集';
                    selectedErrorTags.clear();
                    body.innerHTML = `
                        <div style="margin-bottom:12px;display:flex;gap:8px;flex-wrap:wrap;">
                            <input type="text" id="errorSearch" placeholder="搜索关键词..."
                                style="flex:1;min-width:180px;padding:8px 12px;border:1px solid #ddd;border-radius:6px;font-size:14px;"
                                oninput="searchErrors()">

        function closeModal(e) {
            document.getElementById('infoModal').style.display = 'none';
        }

        // ── Phase 8: 错题集查询 ──────────────────────────────────────────
        let selectedErrorTags = new Set();

        async function loadErrorTags() {
            try {
                const res = await fetch('/api/v1/errors/tags');
                const data = await res.json();
                const cloud = document.getElementById('errorTagCloud');
                if (!cloud) return;
                if (!data.tags || data.tags.length === 0) {
                    cloud.innerHTML = '<span style="color:#999;font-size:12px;">暂无标签</span>';
                    return;
                }
                cloud.innerHTML = data.tags.map(t =>
                    `<span onclick="toggleErrorTag('${t.name}')"
                          id="etag-${t.name}"
                          style="padding:4px 10px;border-radius:12px;font-size:12px;cursor:pointer;border:1px solid #ddd;
                                 background:${selectedErrorTags.has(t.name) ? '#4a90d9' : '#f5f5f5'};
                                 color:${selectedErrorTags.has(t.name) ? '#fff' : '#333'};">
                        ${t.name} (${t.count})
                    </span>`
                ).join('');
            } catch(e) { console.error('loadErrorTags failed:', e); }
        }

        function toggleErrorTag(tag) {
            if (selectedErrorTags.has(tag)) {
                selectedErrorTags.delete(tag);
            } else {
                selectedErrorTags.add(tag);
            }
            loadErrorTags();
            searchErrors();
        }

        async function searchErrors() {
            const search = document.getElementById('errorSearch')?.value || '';
            const severity = document.getElementById('errorSeverityFilter')?.value || '';
            const tags = Array.from(selectedErrorTags).join(',');
            const params = new URLSearchParams();
            if (search) params.set('search', search);
            if (severity) params.set('severity', severity);
            if (tags) params.set('tags', tags);

            const list = document.getElementById('errorList');
            if (!list) return;

            try {
                const res = await fetch(`/api/v1/errors/entries?${params}`);
                const data = await res.json();
                if (!data.entries || data.entries.length === 0) {
                    list.innerHTML = '<div style="text-align:center;color:#999;padding:20px;">暂无匹配的错题记录</div>';
                    return;
                }
                const sevIcon = {critical:'🔴', warning:'🟡', info:'🔵'};
                const srcLabel = {task_failure:'🤖 自动记录', auto:'🤖 AI生成', manual:'✍️ 人工录入'};
                list.innerHTML = `<div style="font-size:12px;color:#999;margin-bottom:8px;">共 ${data.total} 条记录</div>` +
                    data.entries.map(e => {
                        const icon = sevIcon[e.severity] || '⚪';
                        const tagsHtml = (e.tags||[]).map(t =>
                            `<span style="padding:2px 6px;border-radius:8px;font-size:11px;background:#e8f0fe;color:#1967d2;">${t}</span>`
                        ).join(' ');
                        const label = srcLabel[e.source] || e.source;
                        const dt = e.created_at ? new Date(e.created_at).toLocaleDateString() : '';
                        return `
                            <div style="border:1px solid #eee;padding:12px;margin-bottom:8px;border-radius:8px;cursor:pointer;"
                                 onclick="showErrorDetail('${e.id}')">
                                <div style="display:flex;justify-content:space-between;align-items:center;">
                                    <strong>${icon} ${e.title}</strong>
                                    <span style="font-size:11px;color:#999;">命中 ${e.hit_count} 次</span>
                                </div>
                                <div style="margin-top:6px;display:flex;gap:4px;flex-wrap:wrap;">${tagsHtml || '<span style="color:#ccc;font-size:11px;">无标签</span>'}</div>
                                <div style="margin-top:4px;font-size:12px;color:#999;">${label} · ${dt}</div>
                            </div>`;
                    }).join('');
            } catch(e) {
                list.innerHTML = `<span style="color:red">加载失败: ${e.message}</span>`;
            }
        }

        async function showErrorDetail(entryId) {
            const body = document.getElementById('modalBody');
            if (!body) return;
            try {
                const res = await fetch(`/api/v1/errors/entries/${entryId}`);
                const e = await res.json();
                const sevIcon = {critical:'🔴', warning:'🟡', info:'🔵'}[e.severity] || '⚪';
                const tagsHtml = (e.tags||[]).map(t =>
                    `<span style="padding:2px 8px;border-radius:8px;font-size:12px;background:#e8f0fe;color:#1967d2;">${t}</span>`
                ).join(' ');
                const esc = s => (s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;');
                body.innerHTML = `
                    <div style="margin-bottom:16px;">
                        <a href="#" onclick="searchErrors();loadErrorTags();return false;"
                           style="color:#4a90d9;text-decoration:none;font-size:13px;">← 返回列表</a>
                    </div>
                    <h3 style="margin:0 0 8px;">${sevIcon} ${esc(e.title)}</h3>
                    <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:16px;">${tagsHtml || '<span style="color:#ccc;font-size:12px;">无标签</span>'}</div>
                    <div>
                        <h4 style="color:#555;margin:0 0 6px;">📋 错误上下文</h4>
                        <pre style="white-space:pre-wrap;background:#f8f8f8;padding:12px;border-radius:6px;font-size:13px;margin:0;">${esc(e.context)}</pre>
                    </div>
                    <div style="margin-top:12px;">
                        <h4 style="color:#22863a;margin:0 0 6px;">✅ 纠正方案</h4>
                        <pre style="white-space:pre-wrap;background:#f0fff0;padding:12px;border-radius:6px;font-size:13px;margin:0;">${esc(e.correction)}</pre>
                    </div>
                    ${e.prevention ? `
                    <div style="margin-top:12px;">
                        <h4 style="color:#b08800;margin:0 0 6px;">⚠️ 预防建议</h4>
                        <pre style="white-space:pre-wrap;background:#fffde7;padding:12px;border-radius:6px;font-size:13px;margin:0;">${esc(e.prevention)}</pre>
                    </div>` : ''}
                    <div style="margin-top:16px;font-size:12px;color:#999;border-top:1px solid #eee;padding-top:8px;">
                        来源: ${e.source} · 命中次数: ${e.hit_count} · 创建: ${e.created_at ? new Date(e.created_at).toLocaleString() : '—'}
                        ${e.related_skill_ids?.length ? '<br>关联技能: ' + e.related_skill_ids.join(', ') : ''}
                        <br>ID: <span style="font-family:monospace;">${e.id}</span>
                    </div>
                `;
            } catch(err) {
                console.error('showErrorDetail failed:', err);
            }
        }
        // ── Phase 8 End ──────────────────────────────────────────────────

        async function saveSetting(key) {
            const el = document.getElementById(`setting_${key}`);
            const statusEl = document.getElementById(`setting_status_${key}`);
            if (!el) return;
            const value = el.value;
            try {
                const res = await fetch(`/api/v1/settings/${key}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ value }),
                });
                if (res.ok) {
                    statusEl.textContent = '✅ 已保存';
                    statusEl.style.color = '#52c41a';
                } else {
                    const err = await res.json();
                    statusEl.textContent = `❌ ${err.detail || '保存失败'}`;
                    statusEl.style.color = '#ff4d4f';
                }
                setTimeout(() => { statusEl.textContent = ''; }, 3000);
            } catch(e) {
                statusEl.textContent = `❌ ${e.message}`;
                statusEl.style.color = '#ff4d4f';
            }
        }

        /**
         * 刷新 Vision 模型列表：向 /api/v1/settings/vision-models/refresh 发请求，
         * 用返回的最新列表更新 select 下拉并更新时间戳。
         */
        async function refreshVisionModels(evt) {
            const btn = document.getElementById('visionRefreshBtn');
            const labelEl = document.getElementById('vision_model_updated');
            if (btn) { btn.disabled = true; btn.textContent = '刷新中...'; }
            try {
                const res = await fetch('/api/v1/settings/vision-models/refresh', { method: 'POST' });
                if (!res.ok) {
                    const err = await res.json();
                    alert(`刷新失败：${err.detail || res.statusText}`);
                    return;
                }
                const data = await res.json();
                // 更新 select 下拉选项
                const sel = document.getElementById('setting_vision_model');
                if (sel) {
                    const currentVal = sel.value;
                    sel.innerHTML = '';
                    for (const m of data.models) {
                        const opt = document.createElement('option');
                        opt.value = m;
                        opt.textContent = m;
                        if (m === currentVal) opt.selected = true;
                        sel.appendChild(opt);
                    }
                }

                if (labelEl) labelEl.textContent = `上次刷新：${data.updated_at} （${data.count} 个模型）`;
            } catch(e) {

        function toggleIntentionMode() {
            isIntentionMode = !isIntentionMode;

        // 从后端动态加载可用模型列表
        async function loadModels() {
            try {
                const r = await fetch('/api/v1/models');
                const data = await r.json();
                const sel = document.getElementById('modelSelect');
                sel.innerHTML = '';
                const providers = { volcengine: '🌋 火山引擎', gemini: '✨ Gemini' };
                for (const [provider, models] of Object.entries(data.available_models || {})) {

        // 任务结果轮询：收到 task_ids 后等待全部完成，在对话中回显结果
        async function pollUntilDone(taskIds, summaryMsgId) {
            const MAX_POLLS = 120; // 最多轮询 4 分钟
            let polls = 0;
            while (polls++ < MAX_POLLS) {
                await new Promise(r => setTimeout(r, 2000));
                try {
                    const res = await fetch('/api/v1/tasks');
                    const allTasks = await res.json();
                    const mine = allTasks.filter(t => taskIds.includes(t.id));
                    const pending = mine.filter(t => t.status === 'pending' || t.status === 'running');
                    const failed  = mine.filter(t => t.status === 'failed');
                    const done    = mine.filter(t => t.status === 'completed');
                    // 更新右侧面板
                    refreshTasks();
                    // 更新占位消息
                    const msgEl = document.getElementById(summaryMsgId);
                    if (!msgEl) return;
                    if (pending.length === 0) {
                        // 全部结束
                        let html = `<b>✅ 任务已全部完成（${done.length}/${mine.length} 成功）</b><br><br>`;
                        for (const t of mine) {
                            const icon = t.status === 'completed' ? '✅' : '❌';
                            const preview = t.status === 'completed' && t.result
                                ? (typeof t.result === 'string' ? t.result : JSON.stringify(t.result, null, 2)).slice(0, 300)
                                : (t.error_msg || '无输出');
                            html += `<details><summary>${icon} ${t.description.slice(0, 60)}</summary><pre style="white-space:pre-wrap;font-size:12px;margin:4px 0;">${preview.replace(/</g,'&lt;')}</pre></details>`;
                        }
                        if (failed.length > 0) html += `<br>⚠️ ${failed.length} 个任务失败，详见右侧面板。`;
                        msgEl.innerHTML = html;
                        return;
                    } else {
                        msgEl.innerHTML = `⏳ 任务进行中…（${done.length + failed.length}/${mine.length} 已完成）`;
                    }
                } catch(e) { /* ignore */ }
            }
            // 超时
            const msgEl = document.getElementById(summaryMsgId);
            if (msgEl) msgEl.innerHTML = '⚠️ 等待超时，请前往右侧面板查看进度。';
        }

        // 任务状态检查逻辑
        async function refreshTasks() {
            try {
                const response = await fetch('/api/v1/tasks');
                const tasks = await response.json();
                
                if (tasks.length === 0) {
                    taskList.innerHTML = '<div style="text-align: center; color: var(--text-secondary); padding-top: 20px;">暂无任务记录</div>';
                    return;
                }

                // 按创建时间倒序（如果有的话，这里简单倒序）
                taskList.innerHTML = tasks.reverse().map(task => `
                    <div class="task-item">
                        <span class="task-status-tag tag-${task.status}">${task.status}</span>
                        <span class="task-desc">${task.description}</span>
                        <div class="task-meta">
                            ID: ${task.id.slice(0, 8)}...<br>
                            ${task.error_msg ? `<span style="color:red">Error: ${task.error_msg}</span>` : ''}
                            ${task.result ? `<span style="color:green">Result: ${JSON.stringify(task.result).slice(0, 50)}...</span>` : ''}
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                console.error("Failed to fetch tasks:", err);
            }
        }

        // 代理状态更新逻辑
        async function updateProxyUI() {
            try {
                const response = await fetch('/api/v1/proxy/status');
                const data = await response.json();
                const dot = document.getElementById('proxyDot');
                const text = document.getElementById('proxyText');
                const latency = document.getElementById('proxyLatency');
                const card = document.getElementById('proxyStatusCard');

                if (!dot || !text || !latency || !card) return;

                if (data.status === 'ok') {
                    dot.className = 'status-dot online';
                    text.innerText = data.node ? `代理就绪 (${data.node})` : '代理就绪';
                    latency.innerText = data.latency ? `${data.latency}ms` : '就绪';
                    card.classList.remove('error');
                    card.classList.remove('initializing');
                } else if (data.status === 'timeout') {
                    dot.className = 'status-dot offline';
                    text.innerText = '代理超时';
                    latency.innerText = 'TimeOut';
                    card.classList.add('error');
                    card.classList.remove('initializing');
                } else if (data.status === 'initializing') {
                    dot.className = 'status-dot warning';
                    text.innerText = '正在载入配置...';
                    latency.innerText = '--ms';
                    card.classList.remove('error');
                    card.classList.add('initializing');
                } else {
                    dot.className = 'status-dot offline';
                    text.innerText = '代理异常';
                    card.classList.add('error');
                    card.classList.remove('initializing');
                }
            } catch (err) {
                console.error("Failed to check proxy status:", err);
            }
        }

        // 定时刷新
        setInterval(updateProxyUI, 10000);
        setInterval(refreshTasks, 5000);
        setInterval(refreshResearch, 30000);
        setInterval(refreshCode, 30000);

                    <div class="rc-meta">
                        <span class="rc-status ${t.status}">${statusLabel(t.status)}</span>
                        &nbsp;${t.created_at ? new Date(t.created_at * 1000).toLocaleTimeString() : ''}
                    </div>
                </div>`).join('');
        }

        async function openCodeDetail(taskId) {
            const modal = document.getElementById('infoModal');
            document.getElementById('modalTitle').textContent = '💻 代码任务详情';
            document.getElementById('modalBody').innerHTML = '加载中...';
            modal.style.display = 'flex';
            try {
                const res = await fetch(`/api/v1/code/${taskId}`);

                const data = await res.json();
                const code = (data.code || data.result || '暂无输出').replace(/</g,'&lt;').replace(/>/g,'&gt;');
                document.getElementById('modalBody').innerHTML = `
                    <p><strong>任务：</strong>${data.query || taskId}</p>
                    <p><strong>状态：</strong><span class="rc-status ${data.status}">${statusLabel(data.status)}</span></p>
                    ${data.code ? `<details open><summary>代码输出</summary><pre style="white-space:pre-wrap;margin-top:6px;font-size:12px;">${code}</pre></details>` : ''}`;
            } catch(e) { document.getElementById('modalBody').innerHTML = `加载失败: ${e.message}`; }
        }

        function showNewCodeForm() {
            const modal = document.getElementById('infoModal');
            document.getElementById('modalTitle').textContent = '💻 新建代码生成任务';
            document.getElementById('modalBody').innerHTML = `
                <div style="display:flex;flex-direction:column;gap:10px;">
                    <label>代码需求描述</label>
                    <textarea id="codeQuery" rows="4" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:6px;" placeholder="例如：生成一个 FastAPI CRUD 接口，支持分页查询..."></textarea>
                    <label>目标语言</label>
                    <select id="codeLang" style="padding:6px;border:1px solid #ddd;border-radius:6px;">
                        <option value="python">Python</option>
                        <option value="javascript">JavaScript</option>
                        <option value="typescript">TypeScript</option>
                        <option value="bash">Bash</option>
                    </select>
                    <button onclick="submitCode()" style="padding:8px;background:var(--primary-color);color:white;border:none;border-radius:6px;cursor:pointer;">🚀 生成代码</button>
                </div>`;
            modal.style.display = 'flex';
        }

        async function submitCode() {
            const query = document.getElementById('codeQuery').value.trim();
            const lang = document.getElementById('codeLang').value;
            if (!query) return;
            try {
                const res = await fetch('/api/v1/code/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query, language: lang })
                });
                const data = await res.json();
                closeModal();
                switchTab('code');
                refreshCode();
                alert(`✅ 代码任务已启动\nTask ID: ${(data.task_id || '').slice(0,12)}...`);
            } catch(e) { alert('启动失败: ' + e.message); }
        }

        // 状态标签辅助
        function statusLabel(s) {
            const m = { running: '运行中', completed: '已完成', failed: '失败', pending: '等待中' };
            return m[s] || s || '未知';
        }

        // ── Phase 7: 后端驱动的会话管理 ────────────────────────────
        let currentConversationId = null;

        // C-1: 从 API 加载对话列表，渲染到左侧历史栏
        async function renderHistoryList() {
            try {
                const res = await fetch('/api/v1/conversations');
                const data = await res.json();
                const convs = Array.isArray(data) ? data : (data.conversations || []);
                historyList.innerHTML = '';
                if (convs.length === 0) {
                    historyList.innerHTML = '<div style="text-align:center;color:var(--text-secondary);padding:20px 10px;">暂无对话记录</div>';
                    return;
                }
                for (const conv of convs) {
                    const div = document.createElement('div');
                    div.className = `history-item ${conv.id === currentConversationId ? 'active' : ''}`;
                    div.textContent = conv.title || '新对话';
                    div.onclick = () => loadChat(conv.id);
                    historyList.appendChild(div);
                }
            } catch(e) {
                console.error('renderHistoryList failed:', e);
            }
        }

        // C-1: 新建对话（向后端请求）
        async function createNewChat() {
            try {
                const res = await fetch('/api/v1/conversations', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title: '新对话', model: modelSelect.value || 'ark-code-latest' })
                });
                const conv = await res.json();
                currentConversationId = conv.id;
                localStorage.setItem('wateryLastConversationId', conv.id);
                chatTitle.textContent = conv.title || '新对话';
                chatMessages.innerHTML = '';
                showWelcomeMessage();
                await renderHistoryList();
            } catch(e) {
                console.error('createNewChat failed:', e);
            }
        }

        // C-1: 加载一个对话（从后端拉取完整消息列表）
        async function loadChat(convId) {
            if (!convId) return;
            currentConversationId = convId;
            localStorage.setItem('wateryLastConversationId', convId);
            chatMessages.innerHTML = '';
            chatTitle.textContent = '加载中...';
            try {
                const res = await fetch(`/api/v1/conversations/${convId}`);
                if (!res.ok) { showWelcomeMessage(); return; }
                const data = await res.json();
                chatTitle.textContent = data.title || '对话';
                const messages = data.messages || [];
                if (messages.length === 0) {
                    showWelcomeMessage();
                } else {
                    for (const msg of messages) {
                        if (msg.role === 'system') continue; // 不显示系统消息
                        if (msg.role === 'tool') continue;   // 工具回复不单独显示
                        // C-3: 处理历史中的 tool_calls（OpenAI 格式 → 展示卡片）
                        let displayToolCalls = null;
                        const rawToolCalls = msg.tool_calls;
                        if (rawToolCalls) {
                            try {
                                const parsed = typeof rawToolCalls === 'string'
                                    ? JSON.parse(rawToolCalls) : rawToolCalls;
                                if (Array.isArray(parsed) && parsed.length > 0) {
                                    displayToolCalls = parsed.map(tc => ({
                                        tool_name: tc.function?.name || tc.name || '?',
                                        tool_call_id: tc.id,
                                        result: { status: 'success', result: '(历史记录)' }
                                    }));
                                }
                            } catch {}
                        }
                        appendMessageWithTools(msg.role, msg.content, displayToolCalls);
                    }
                }
                await renderHistoryList();
            } catch(e) {
                console.error('loadChat failed:', e);
                showWelcomeMessage();
            }
        }

        // C-1: 删除当前对话
        async function deleteCurrentChat() {
            if (!currentConversationId) return;
            if (!confirm('确定要删除当前对话吗？')) return;
            try {
                await fetch(`/api/v1/conversations/${currentConversationId}`, { method: 'DELETE' });
                currentConversationId = null;
                localStorage.removeItem('wateryLastConversationId');
            } catch(e) {
                console.error('deleteCurrentChat failed:', e);
            }
            await renderHistoryList();
            try {
                const res = await fetch('/api/v1/conversations');
                const data = await res.json();
                const convs = Array.isArray(data) ? data : (data.conversations || []);
                if (convs.length > 0) {
                    await loadChat(convs[0].id);
                } else {
                    await createNewChat();
                }
            } catch { await createNewChat(); }
        }

        // C-4: 迁移 localStorage 历史到后端
        async function migrateLocalStorageToBackend() {
            const raw = localStorage.getItem('wateryChats');
            if (!raw) return;
            let oldChats;
            try { oldChats = JSON.parse(raw); } catch { localStorage.removeItem('wateryChats'); return; }
            const chatIds = Object.keys(oldChats);
            if (chatIds.length === 0) { localStorage.removeItem('wateryChats'); return; }
            console.log(`正在迁移 ${chatIds.length} 个历史对话到后端...`);
            for (const chatId of chatIds) {
                const chat = oldChats[chatId];
                if (!chat || !chat.messages || chat.messages.length === 0) continue;
                try {
                    const createRes = await fetch('/api/v1/conversations', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ title: chat.title || '迁移对话', model: 'ark-code-latest' })
                    });
                    const newConv = await createRes.json();
                    await fetch(`/api/v1/conversations/${newConv.id}/import`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ messages: chat.messages })
                    });
                } catch(e) {
                    console.warn('迁移对话失败:', chat.title, e);
                }
            }
            localStorage.removeItem('wateryChats');
            console.log('历史对话迁移完成。');
        }

        // 页面加载入口
        window.onload = async () => {
            loadModels();
            updateProxyUI();
            // C-4: 先迁移旧 localStorage 数据
            await migrateLocalStorageToBackend();
            // 加载对话列表
            await renderHistoryList();
            // 恢复上次对话
            const lastId = localStorage.getItem('wateryLastConversationId');
            if (lastId) {
                await loadChat(lastId);
            } else {
                try {
                    const res = await fetch('/api/v1/conversations');
                    const data = await res.json();
                    const convs = Array.isArray(data) ? data : (data.conversations || []);
                    if (convs.length > 0) {
                        await loadChat(convs[0].id);
                    } else {
                        await createNewChat();
                    }
                } catch { await createNewChat(); }
            }
        };

        function showWelcomeMessage() {
            chatMessages.innerHTML = `
                <div class="message assistant">
                    你好！我是 Watery AI Agent。我已经准备好协助你了。
                </div>
            `;
        }

        function handleKeyDown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        // ── 附件支持 ───────────────────────────────────────────
        let pendingAttachments = []; // [{type:'image'|'text', name, content, mimeType?}]

        /**
         * 处理用户选择的文件列表：
         * - 图片   → 浏览器端转 base64 data URL（无需上传服务器）
         * - .txt/.md → FileReader 读取文本（无需上传）
         * - PDF/DOCX → 上传到 /api/v1/chat/upload 进行服务器端提取
         */
        async function handleFileAttach(event) {
            const files = Array.from(event.target.files);
            event.target.value = ''; // 允许重复选择同一文件
            const MAX_SIZE = 20 * 1024 * 1024; // 20 MB

            for (const file of files) {
                if (file.size > MAX_SIZE) {
                    alert(`"《${file.name}》"超过 20 MB 限制，已跳过。`);
                    continue;
                }
                try {
                    if (file.type.startsWith('image/')) {
                        const dataUrl = await _readAsDataURL(file);
                        pendingAttachments.push({ type: 'image', name: file.name, content: dataUrl, mimeType: file.type });
                        renderAttachmentPreview();
                    } else if (file.type.startsWith('text/') || /\.(txt|md|csv|log)$/i.test(file.name)) {
                        const text = await _readAsText(file);
                        pendingAttachments.push({ type: 'text', name: file.name, content: text });
                        renderAttachmentPreview();
                    } else {
                        // PDF / DOCX —— 上传到后端提取文本
                        const chipId = 'chip-loading-' + Date.now();
                        _showLoadingChip(file.name, chipId);
                        const formData = new FormData();
                        formData.append('file', file);
                        const res = await fetch('/api/v1/chat/upload', { method: 'POST', body: formData });
                        document.getElementById(chipId)?.remove();
                        if (!res.ok) {
                            const err = await res.json().catch(() => ({}));
                            alert(`处理《${file.name}》失败：${err.detail || res.statusText}`);
                            continue;
                        }
                        const data = await res.json();
                        pendingAttachments.push({ type: 'text', name: data.name, content: data.content });
                        renderAttachmentPreview();
                    }
                } catch (e) {
                    alert(`附件处理异常：${e.message}`);
                }
            }
        }

        function _readAsDataURL(file) {
            return new Promise((resolve, reject) => {
                const r = new FileReader();
                r.onload = e => resolve(e.target.result);
                r.onerror = reject;
                r.readAsDataURL(file);
            });
        }

        function _readAsText(file) {
            return new Promise((resolve, reject) => {
                const r = new FileReader();
                r.onload = e => resolve(e.target.result);
                r.onerror = reject;
                r.readAsText(file, 'UTF-8');
            });
        }

        function _showLoadingChip(name, id) {
            const area = document.getElementById('attachmentPreviewArea');
            area.style.display = 'flex';
            const chip = document.createElement('div');
            chip.className = 'attachment-chip';
            chip.id = id;
            chip.innerHTML = `<span>⏳</span><span class="chip-name">${name.substring(0, 18)}</span><span class="chip-meta">上传中...</span>`;
            area.appendChild(chip);
        }

        function removeAttachment(index) {
            pendingAttachments.splice(index, 1);
            renderAttachmentPreview();
        }

        function renderAttachmentPreview() {
            const area = document.getElementById('attachmentPreviewArea');
            if (!pendingAttachments.length) {
                area.style.display = 'none';
                area.innerHTML = '';
                return;
            }
            area.style.display = 'flex';
            area.innerHTML = pendingAttachments.map((att, i) => {
                if (att.type === 'image') {
                    return `<div class="attachment-chip">
                        <img src="${att.content}" alt="${att.name}">
                        <span class="chip-name" title="${att.name}">${att.name.substring(0, 16)}</span>
                        <button class="chip-remove" onclick="removeAttachment(${i})" title="移除">&times;</button>
                    </div>`;
                }
                const icon = /\.pdf$/i.test(att.name) ? '📄' : /\.docx?$/i.test(att.name) ? '📝' : '📃';
                const sz = att.content.length >= 1000
                    ? `${Math.round(att.content.length / 1000)}K字`
                    : `${att.content.length}字`;
                return `<div class="attachment-chip">
                    <span>${icon}</span>
                    <span class="chip-name" title="${att.name}">${att.name.substring(0, 18)}</span>
                    <span class="chip-meta">${sz}</span>
                    <button class="chip-remove" onclick="removeAttachment(${i})" title="移除">&times;</button>
                </div>`;
            }).join('');
        }

        /**
         * 在聊天消息区显示用户消息（含附件预览）。
         * 图片显示缩略图；文件显示图标+文件名。
         */
        function appendUserMessage(text, attachments) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message user';
            let html = '';

            if (attachments && attachments.length > 0) {
                html += '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px;">';
                for (const att of attachments) {
                    if (att.type === 'image') {
                        html += `<img src="${att.content}" alt="${att.name}" style="max-width:180px;max-height:140px;border-radius:8px;object-fit:cover;">`;
                    } else {
                        const icon = /\.pdf$/i.test(att.name) ? '📄' : /\.docx?$/i.test(att.name) ? '📝' : '📃';
                        html += `<span style="display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:10px;background:rgba(255,255,255,0.3);font-size:12px;">${icon} ${att.name}</span>`;
                    }
                }
                html += '</div>';
            }

            if (text) html += text.replace(/\n/g, '<br>');
            msgDiv.innerHTML = html;
            chatMessages.appendChild(msgDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function appendMessage(role, content) {
            appendMessageWithTools(role, content, null);
        }

        // 支持工具调用卡片的消息渲染
        function appendMessageWithTools(role, content, toolResults) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;

            let html = '';
            // 工具调用卡片
            if (toolResults && toolResults.length > 0) {
                for (const tr of toolResults) {
                    const ok = tr.result && tr.result.status === 'success';
                    const resultText = JSON.stringify(
                        tr.result?.result ?? tr.result?.message ?? tr.result ?? ''
                    ).slice(0, 150);
                    html += `<div class="tool-call-card ${ok ? '' : 'error'}">
                        <div class="tool-call-header">${ok ? '🔧' : '❌'} 工具调用: ${tr.tool_name || tr.tool_call_id || '?'}</div>
                        <div class="tool-call-result">→ ${resultText}</div>
                    </div>`;
                }
            }
            // 正文（换行处理）
            if (content) {
                html += content.replace(/\n/g, '<br>');
            }
            msgDiv.innerHTML = html;
            chatMessages.appendChild(msgDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // C-2: 新版 sendMessage — 只发单条用户消息 + conversation_id，历史由后端管理
        async function sendMessage() {
            const text = userInput.value.trim();
            const hasAttachments = pendingAttachments.length > 0;
            if (!text && !hasAttachments) return;

            // 快照并清空附件列表
            const attachmentsSnap = [...pendingAttachments];
            pendingAttachments = [];
            renderAttachmentPreview();

            userInput.value = '';
            userInput.disabled = true;
            sendBtn.disabled = true;

            // 渲染用户消息（含附件预览）
            appendUserMessage(text, attachmentsSnap);

            // 构建发送给 LLM 的 content：纯文本 or 多模态数组
            const imgAttachments = attachmentsSnap.filter(a => a.type === 'image');
            const textAttachments = attachmentsSnap.filter(a => a.type === 'text');

            let fullText = text;
            for (const tf of textAttachments) {
                const excerpt = tf.content.length > 8000
                    ? tf.content.substring(0, 8000) + '\n…(内容过长，已截断)'
                    : tf.content;
                fullText += `\n\n---\n[附件：${tf.name}]\n\`\`\`\n${excerpt}\n\`\`\``;
            }

            let messageContent;
            if (imgAttachments.length > 0) {
                // 多模态消息（需要支持 Vision 的模型，如 gemini-2.5-flash）
                const parts = [];
                if (fullText.trim()) parts.push({ type: 'text', text: fullText });
                for (const img of imgAttachments) {
                    parts.push({ type: 'image_url', image_url: { url: img.content } });
                }
                messageContent = parts;
            } else {
                messageContent = fullText || '';
            }

            const loadingId = 'loading-' + Date.now();
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message assistant';
            loadingDiv.id = loadingId;
            loadingDiv.textContent = isIntentionMode ? '正在拆解并分发任务...' : '思考中...';
            chatMessages.appendChild(loadingDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;

            try {
                if (isIntentionMode) {
                    const response = await fetch('/api/v1/intention', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ intention: text })
                    });
                    const data = await response.json();
                    document.getElementById(loadingId)?.remove();
                    if (response.ok && data.status === 'success' && data.task_ids?.length > 0) {
                        const summaryId = 'task-summary-' + Date.now();
                        const container = document.createElement('div');
                        container.className = 'message assistant';
                        container.id = summaryId;
                        container.textContent = `⏳ 已分配 ${data.task_ids.length} 个子任务，等待执行中...`;
                        chatMessages.appendChild(container);
                        chatMessages.scrollTop = chatMessages.scrollHeight;
                        pollUntilDone(data.task_ids, summaryId);
                        refreshTasks();
                    } else {
                        appendMessage('assistant', `✅ 任务已发送。${data.message || ''}`);
                    }
                } else {
                    // 确保有当前对话
                    if (!currentConversationId) {
                        await createNewChat();
                    }
                    const response = await fetch('/api/v1/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            conversation_id: currentConversationId,
                            messages: [{ role: 'user', content: messageContent }],
                            model: modelSelect.value
                        })
                    });
                    const data = await response.json();
                    document.getElementById(loadingId)?.remove();
                    if (response.ok) {
                        const toolResults = data.tool_results || null;
                        appendMessageWithTools('assistant', data.content, toolResults);
                        // 后端可能返回最终 conversation_id（首次创建时）
                        if (data.conversation_id) {
                            currentConversationId = data.conversation_id;
                            localStorage.setItem('wateryLastConversationId', data.conversation_id);
                        }
                        // 异步刷新侧边栏（更新标题、排序）
                        renderHistoryList().then(() => {
                            const activeItem = historyList.querySelector('.history-item.active');
                            if (activeItem) chatTitle.textContent = activeItem.textContent;
                        });
                    } else {
                        appendMessage('assistant', `❌ 错误: ${data.detail || '请求失败'}`);
                    }
                }
            } catch (error) {
                document.getElementById(loadingId)?.remove();
                appendMessage('assistant', `❌ 网络错误: ${error.message}`);
            } finally {
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.focus();
            }
        }
    </script>
