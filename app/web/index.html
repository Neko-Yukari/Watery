<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watery AI Agent</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --sidebar-bg: #ffffff;
            --chat-bg: #ffffff;
            --task-bg: #f8f9fa;
            --text-primary: #333333;
            --text-secondary: #666666;
            --border-color: #e0e0e0;
            --primary-color: #1a73e8;
            --user-msg-bg: #e3f2fd;
            --ai-msg-bg: #f5f5f5;
            --pending-color: #ffc107;
            --running-color: #2196f3;
            --completed-color: #4caf50;
            --failed-color: #f44336;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* 左侧边栏 */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 20px;
            flex-shrink: 0;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 20px;
            text-align: center;
        }

        .new-chat-btn {
            width: 100%;
            padding: 10px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .new-chat-btn:hover {
            background-color: #1557b0;
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 20px;
        }

        /* 代理状态指示器 */
        .proxy-status-card {
            padding: 12px;
            background-color: #f8f9fa;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            margin-top: auto;
            font-size: 13px;
        }

        .proxy-status-card.error {
            border-color: #ff5252;
            background-color: #ffebee;
        }
        
        .proxy-status-card.initializing {
            border-color: #ffc107;
            background-color: #fff9c4;
        }

        .status-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 6px;
        }

        .status-dot.online { background-color: #4caf50; }
        .status-dot.offline { background-color: #ff5252; }
        .status-dot.warning { background-color: #ffc107; }

        .history-item {
            padding: 10px 12px;
            margin-bottom: 8px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: background-color 0.2s;
        }

        .history-item:hover {
            background-color: var(--bg-color);
        }

        .history-item.active {
            background-color: #e8f0fe;
            color: var(--primary-color);
            font-weight: 500;
        }

        .nav-item {
            padding: 12px 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
            font-weight: 500;
        }

        .nav-item:hover {
            background-color: var(--bg-color);
        }

        .nav-item.active {
            background-color: #e8f0fe;
            color: var(--primary-color);
        }

        .model-selector {
            margin-top: auto;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
        }

        .model-selector select {
            width: 100%;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            margin-top: 8px;
        }

        /* 模态框样式 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            width: 80%;
            max-width: 800px;
            height: 80%;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .modal-header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 18px;
            font-weight: bold;
        }
        .modal-close {
            cursor: pointer;
            background: none;
            border: none;
            font-size: 24px;
            color: var(--text-secondary);
        }
        .modal-body {
            padding: 20px;
            overflow-y: auto;
            flex: 1;
            font-size: 14px;
            line-height: 1.6;
        }
        .modal-body pre {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 6px;
            overflow-x: auto;
        }

        /* 主聊天区 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--chat-bg);
            border-right: 1px solid var(--border-color);
        }

        /* 任务看板 */
        .task-sidebar {
            width: 300px;
            background-color: var(--task-bg);
            display: flex;
            flex-direction: column;
            padding: 15px;
            flex-shrink: 0;
        }

        .task-header {
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .task-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .task-item {
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px;
            font-size: 13px;
            position: relative;
        }

        .task-status-tag {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            float: right;
            text-transform: uppercase;
            font-weight: bold;
        }

        .tag-pending { background-color: #fff8e1; color: #ffa000; }
        .tag-running { background-color: #e3f2fd; color: #1976d2; }
        .tag-completed { background-color: #e8f5e9; color: #388e3c; }
        .tag-failed { background-color: #ffebee; color: #d32f2f; }

        .task-desc {
            font-weight: 500;
            margin-bottom: 6px;
            display: block;
            margin-top: 5px;
            word-break: break-all;
        }

        .task-meta {
            color: var(--text-secondary);
            font-size: 11px;
        }

        /* 主聊天区 */
        .chat-header {
            height: 60px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            padding: 0 20px;
            font-size: 18px;
            font-weight: 600;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .message {
            max-width: 80%;
            padding: 15px;
            border-radius: 12px;
            line-height: 1.5;
        }

        .message.user {
            align-self: flex-end;
            background-color: var(--user-msg-bg);
            border-bottom-right-radius: 4px;
        }

        .message.assistant {
            align-self: flex-start;
            background-color: var(--ai-msg-bg);
            border-bottom-left-radius: 4px;
        }

        .chat-input-container {
            padding: 20px;
            border-top: 1px solid var(--border-color);
            background-color: var(--chat-bg);
        }

        .chat-input-wrapper {
            display: flex;
            gap: 10px;
            max-width: 800px;
            margin: 0 auto;
        }

        .chat-input {
            flex: 1;
            padding: 15px;
            border: 1px solid var(--border-color);
            border-radius: 24px;
            font-size: 16px;
            resize: none;
            outline: none;
            height: 54px;
            font-family: inherit;
        }

        .chat-input:focus {
            border-color: var(--primary-color);
        }

        .send-btn {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s;
        }

        .send-btn:hover {
            background-color: #1557b0;
        }

        .send-btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        /* 停止按钮（Tool Calling 中断） */
        .send-btn.stopping {
            background-color: #ff4d4f;
            width: 54px;
            height: 54px;
        }
        .send-btn.stopping:hover {
            background-color: #ff7875;
        }

        /* 消息操作栏 */
        .msg-action-bar {
            display: flex; gap: 6px; margin-top: 10px; align-items: center;
            opacity: 0; transition: opacity 0.2s ease;
            padding-top: 8px; border-top: 1px solid rgba(0,0,0,0.05);
        }
        .message.assistant:hover .msg-action-bar,
        .message.assistant:last-of-type .msg-action-bar {
            opacity: 1;
        }

        .msg-action-btn {
            display: inline-flex; align-items: center; gap: 3px;
            padding: 3px 8px; border: 1px solid #ddd; border-radius: 5px;
            background: white; color: #555; font-size: 11px; cursor: pointer;
            transition: all 0.15s;
        }
        .msg-action-btn:hover {
            background: #e8f0fe; border-color: var(--primary-color); color: var(--primary-color);
        }

        /* 已停止徽章 */
        .stopped-badge {
            display: inline-block; padding: 2px 8px; border-radius: 10px;
            background: #fff3cd; color: #856404; font-size: 11px; font-weight: 600;
            margin-left: 6px;
        }

        /* 停止按钮状态 */
        .send-btn.stopping {
            background-color: #f44336;
            width: 54px;
            height: 54px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .send-btn.stopping:hover {
            background-color: #d32f2f;
        }

        /* 消息操作栏 */
        .msg-action-bar {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            opacity: 0;
            transition: opacity 0.2s;
            font-size: 12px;
        }
        .message.assistant:hover .msg-action-bar,
        .message.assistant:last-of-type .msg-action-bar {
            opacity: 1;
        }

        .msg-action-btn {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            padding: 4px 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            background: white;
            color: #555;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.15s;
        }
        .msg-action-btn:hover {
            background: #e8f0fe;
            border-color: var(--primary-color);
            color: var(--primary-color);
        }
        .msg-action-btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            background: #f5f5f5;
            border-color: #e0e0e0;
            color: #999;
        }

        /* Stopped badge */
        .stopped-badge {
            display: inline-block;
            background: #fff3cd;
            color: #856404;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            margin-left: 8px;
            font-weight: 500;
        }

        /* 拖放高亮状态 */
        .chat-input-container.drag-over {
            background: #e8f4ff;
            transition: background 0.15s;
        }
        .chat-input-container.drag-over .chat-input-wrapper {
            outline: 2px dashed var(--primary-color);
            outline-offset: 2px;
            border-radius: 12px;
        }
        .drag-over-hint {
            display: none;
            text-align: center;
            color: var(--primary-color);
            font-size: 13px;
            padding: 2px 0 6px;
            pointer-events: none;
        }
        .chat-input-container.drag-over .drag-over-hint { display: block; }

        /* ── 附件上传 UI ─────────────────────────────────────────── */
        .attach-btn {
            width: 42px;
            height: 54px;
            background: none;
            border: none;
            cursor: pointer;
            color: #aaa;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            flex-shrink: 0;
            transition: color 0.2s;
        }
        .attach-btn:hover { color: var(--primary-color); }

        .attachment-preview-area {
            max-width: 800px;
            margin: 0 auto 8px;
            display: none;
            flex-wrap: wrap;
            gap: 8px;
            padding: 4px 0;
        }

        .attachment-chip {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 8px 4px 6px;
            border-radius: 16px;
            border: 1px solid #dde2ea;
            background: #f5f7fa;
            font-size: 12px;
            max-width: 230px;
        }
        .attachment-chip img {
            width: 36px;
            height: 36px;
            object-fit: cover;
            border-radius: 6px;
            flex-shrink: 0;
        }
        .attachment-chip .chip-name {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 120px;
            color: #333;
        }
        .attachment-chip .chip-meta {
            color: #999;
            font-size: 11px;
            flex-shrink: 0;
        }
        .attachment-chip .chip-remove {
            cursor: pointer;
            color: #bbb;
            font-size: 16px;
            line-height: 1;
            background: none;
            border: none;
            padding: 0;
            flex-shrink: 0;
        }
        .attachment-chip .chip-remove:hover { color: #ff4d4f; }

        /* Markdown 样式简易支持 */
        .message pre {
            background-color: #2d2d2d;
            color: #ccc;
            padding: 10px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 10px 0;
        }
        .message code {
            font-family: monospace;
        }

        /* ── C-1: 工具调用卡片 ── */
        .tool-call-card {
            background: #f0f4ff;
            border-left: 3px solid #1a73e8;
            border-radius: 6px;
            padding: 8px 12px;
            margin: 6px 0;
            font-size: 12px;
        }
        .tool-call-card.error {
            border-left-color: #d32f2f;
            background: #fff0f0;
        }
        .tool-call-header {
            font-weight: 600;
            color: #1a73e8;
            margin-bottom: 4px;
        }
        .tool-call-card.error .tool-call-header {
            color: #d32f2f;
        }
        .tool-call-card.pending {
            border-left-color: #ffc107;
            background: #fff9e6;
        }
        .tool-call-card.success {
            border-left-color: #4caf50;
            background: #f0fff0;
        }
        .stream-text {
            white-space: pre-wrap;
            word-break: break-word;
        }
        .tool-call-result {
            color: #555;
            word-break: break-all;
        }

        /* ── C-2: Tab 导航 ── */
        .tab-nav {
            display: flex;
            gap: 4px;
            padding: 6px 10px 0;
            border-bottom: 1px solid var(--border-color);
        }
        .tab-btn {
            flex: 1;
            padding: 5px 4px;
            border: 1px solid transparent;
            background: transparent;
            border-radius: 6px 6px 0 0;
            cursor: pointer;
            font-size: 11px;
            color: var(--text-secondary);
            transition: all 0.15s;
        }
        .tab-btn:hover { background: #f3f4f6; }
        .tab-btn.active {
            background: #e8f0fe;
            color: var(--primary-color);
            font-weight: 600;
            border-color: var(--border-color);
            border-bottom-color: #e8f0fe;
        }
        .tab-panel { display: none; flex: 1; overflow-y: auto; padding: 8px; flex-direction: column; gap: 6px; }
        .tab-panel.active { display: flex; }
        .panel-action-bar { display: flex; gap: 6px; margin-bottom: 6px; }
        .panel-action-bar button {
            flex: 1; padding: 5px; font-size: 12px;
            background: var(--primary-color); color: white;
            border: none; border-radius: 6px; cursor: pointer;
        }
        .research-card, .code-card {
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 8px 10px;
            font-size: 12px;
        }
        .research-card .rc-title, .code-card .rc-title {
            font-weight: 600; margin-bottom: 3px;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .rc-meta { color: var(--text-secondary); font-size: 11px; }
        .rc-status {
            display: inline-block; padding: 1px 6px;
            border-radius: 10px; font-size: 10px; font-weight: 600;
        }
        .rc-status.running { background: #fff3cd; color: #856404; }
        .rc-status.completed { background: #d4edda; color: #155724; }
        .rc-status.failed { background: #f8d7da; color: #721c24; }
        .rc-status.pending { background: #e2e3e5; color: #383d41; }

        /* ── 回收站卡片样式 ── */
        .archive-card {
            border: 1px solid #f0d0d0;
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 12px;
            background: #fff8f8;
            transition: box-shadow 0.15s;
            cursor: pointer;
        }
        .archive-card:hover { box-shadow: 0 1px 6px rgba(220,53,69,0.15); }
        .archive-card .ac-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }
        .archive-card .ac-title {
            font-weight: 600;
            font-size: 12px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 70%;
        }
        .archive-card .ac-time {
            color: var(--text-secondary);
            font-size: 10px;
        }
        .archive-card .ac-user {
            color: var(--primary-color);
            font-size: 11px;
            margin-bottom: 3px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .archive-card .ac-assistant {
            color: #666;
            font-size: 11px;
            margin-bottom: 4px;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }
        .archive-card .ac-annotation {
            background: #fffbe6;
            border: 1px solid #ffe58f;
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 11px;
            color: #ad6800;
            margin-top: 4px;
        }
        .archive-card .ac-annotation:empty { display: none; }
        .archive-card .ac-actions {
            display: flex;
            gap: 4px;
            margin-top: 6px;
        }
        .archive-card .ac-actions button {
            flex: 1;
            padding: 3px 6px;
            font-size: 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background: white;
            cursor: pointer;
            transition: background 0.15s;
        }
        .archive-card .ac-actions button:hover { background: #f3f4f6; }
        .archive-card .ac-actions button.danger { color: #dc3545; border-color: #f5c6cb; }
        .archive-card .ac-actions button.danger:hover { background: #f8d7da; }
        .archive-empty {
            text-align: center;
            color: var(--text-secondary);
            padding-top: 20px;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">Watery AI</div>
        
        <button class="new-chat-btn" onclick="createNewChat()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            新对话
        </button>

        <div class="history-list" id="historyList">
            <!-- 历史对话列表将在这里动态生成 -->
        </div>

        <!-- 代理健康状态展示 -->
        <div id="proxyStatusCard" class="proxy-status-card" style="margin-bottom: 15px;">
            <div style="display: flex; align-items: center; justify-content: space-between;">
                <div>
                   <span id="proxyDot" class="status-dot warning"></span>
                   <span id="proxyText">检测代理中...</span>
                </div>
                <span id="proxyLatency" style="color: var(--text-secondary); font-size: 11px;">--ms</span>
            </div>
        </div>

        <div style="border-top: 1px solid var(--border-color); padding-top: 15px; margin-bottom: 15px;">
            <div class="nav-item" onclick="openModal('knowledge')">📚 知识库</div>
            <div class="nav-item" onclick="openModal('skills')">🛠️ 技能库</div>
            <div class="nav-item" onclick="openModal('errors')">📓 错题集</div>
            <div class="nav-item" onclick="openModal('settings')">⚙️ 设置</div>
        </div>

        <div class="model-selector">
            <label for="modelSelect">当前模型:</label>
            <select id="modelSelect">
                <option value="ark-code-latest">加载中...</option>
            </select>
        </div>
    </div>

    <div class="main-content">
        <div class="chat-header" style="display: flex; justify-content: space-between; align-items: center;">
            <div style="display: flex; align-items: center; gap: 10px;">
                <span id="chatTitle">新对话</span>
                <span id="intentionBadge" style="display: none; background: #e8f0fe; color: #1a73e8; font-size: 11px; padding: 2px 8px; border-radius: 10px;">任务模式</span>
            </div>
            <div>
                <button onclick="toggleIntentionMode()" id="intentionToggleBtn" style="margin-right: 10px; padding: 6px 12px; border-radius: 6px; border: 1px solid var(--primary-color); color: var(--primary-color); background: white; cursor: pointer; font-size: 13px;">切换任务模式</button>
                <button onclick="deleteCurrentChat()" style="padding: 6px 12px; border-radius: 6px; border: 1px solid #ff4d4f; color: #ff4d4f; background: white; cursor: pointer; font-size: 13px;">删除</button>
            </div>
        </div>
        
        <div class="chat-messages" id="chatMessages">
            <!-- 初始欢迎消息将由 JS 动态生成或从历史记录恢复 -->
        </div>

        <div class="chat-input-container">
            <!-- 拖放提示 -->
            <div class="drag-over-hint">📎 松开鼠标添加附件</div>
            <!-- 附件预览区 -->
            <div id="attachmentPreviewArea" class="attachment-preview-area"></div>
            <!-- 输入行 -->
            <div class="chat-input-wrapper">
                <!-- 隐藏文件选择器（支持图片/PDF/文档/纯文本） -->
                <input type="file" id="fileAttachInput" multiple
                    accept="image/png,image/jpeg,image/gif,image/webp,.pdf,.docx,.txt,.md"
                    style="display:none" onchange="handleFileAttach(event)">
                <button class="attach-btn" onclick="document.getElementById('fileAttachInput').click()" title="上传图片或文件">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
                    </svg>
                </button>
                <textarea class="chat-input" id="userInput" placeholder="输入消息，可附加图片/PDF/文档..." rows="1" onkeydown="handleKeyDown(event)"></textarea>
                <button class="send-btn" id="sendBtn" onclick="if (_generating) stopGeneration(); else sendMessage()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <div class="task-sidebar">
        <div class="task-header">
            <span id="sidebarTitle">任务看板</span>
            <button onclick="refreshCurrentTab()" style="background: none; border: none; cursor: pointer; font-size: 16px;">🔄</button>
        </div>
        <!-- C-2: Tab 导航 -->
        <div class="tab-nav">
            <button class="tab-btn active" id="tab-tasks" onclick="switchTab('tasks')">📋 任务</button>
            <button class="tab-btn" id="tab-research" onclick="switchTab('research')">🔬 研究</button>
            <button class="tab-btn" id="tab-code" onclick="switchTab('code')">💻 代码</button>
            <button class="tab-btn" id="tab-archive" onclick="switchTab('archive')">🗑️ 回收站</button>
        </div>
        <!-- 任务面板 -->
        <div class="tab-panel active" id="panel-tasks">
            <div class="task-list" id="taskList">
                <div style="text-align: center; color: var(--text-secondary); padding-top: 20px;">暂无进行中的任务</div>
            </div>
        </div>
        <!-- 研究面板 -->
        <div class="tab-panel" id="panel-research">
            <div class="panel-action-bar">
                <button onclick="showNewResearchForm()">＋ 新建研究</button>
                <button onclick="refreshResearch()" style="flex:0;padding:5px 8px;background:#6c757d;">🔄</button>
            </div>
            <div id="researchList"><div style="text-align:center;color:var(--text-secondary);padding-top:20px;">暂无研究任务</div></div>
        </div>
        <!-- 代码面板 -->
        <div class="tab-panel" id="panel-code">
            <div class="panel-action-bar">
                <button onclick="showNewCodeForm()">＋ 新建代码任务</button>
                <button onclick="refreshCode()" style="flex:0;padding:5px 8px;background:#6c757d;">🔄</button>
            </div>
            <div id="codeList"><div style="text-align:center;color:var(--text-secondary);padding-top:20px;">暂无代码任务</div></div>
        </div>
        <!-- 回收站面板 -->
        <div class="tab-panel" id="panel-archive">
            <div class="panel-action-bar">
                <button onclick="refreshArchive()" style="background:#6c757d;">🔄 刷新</button>
                <button onclick="clearAllArchive()" style="background:#dc3545;">🗑️ 清空全部</button>
            </div>
            <div id="archiveList"><div class="archive-empty">暂无被回滚的对话</div></div>
        </div>
    </div>

    <!-- 模态框 -->
    <div class="modal-overlay" id="infoModal" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <span id="modalTitle">标题</span>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody">
                加载中...
            </div>
        </div>
    </div>

    <script>
        const chatMessages = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const modelSelect = document.getElementById('modelSelect');
        const historyList = document.getElementById('historyList');
        const chatTitle = document.getElementById('chatTitle');
        const taskList = document.getElementById('taskList');
        const intentionBadge = document.getElementById('intentionBadge');
        const SEND_BTN_DEFAULT_HTML = sendBtn.innerHTML;

        let isIntentionMode = false;

        // 模态框逻辑
        async function openModal(type) {
            const modal = document.getElementById('infoModal');
            const title = document.getElementById('modalTitle');
            const body = document.getElementById('modalBody');
            
            modal.style.display = 'flex';
            body.innerHTML = '加载中...';

            try {
                if (type === 'knowledge') {
                    title.textContent = '📚 知识库 (Markdown 文档)';
                    const res = await fetch('/api/v1/knowledge');
                    const data = await res.json();
                    body.innerHTML = `<ul>${data.knowledge_files.map(f => `<li>${f}</li>`).join('')}</ul><p style="margin-top:10px;color:gray;">(这些文件存储在项目根目录，作为 RAG 的基础知识)</p>`;
                } else if (type === 'skills') {
                    title.textContent = '🛠️ 技能库 (SQLite & ChromaDB)';
                    const res = await fetch('/api/v1/skills');
                    const data = await res.json();
                    if (data.skills && data.skills.length > 0) {
                        body.innerHTML = data.skills.map(s => `
                            <div style="border:1px solid #eee; padding:10px; margin-bottom:10px; border-radius:6px;">
                                <strong>${s.name}</strong> (${s.language})<br>
                                <span style="color:gray;font-size:12px;">ID: ${s.id} | Entry: ${s.entrypoint}</span>
                            </div>
                        `).join('');
                    } else {
                        body.innerHTML = '暂无注册的技能。';
                    }
                } else if (type === 'errors') {
                    title.textContent = '📓 错题集';
                    selectedErrorTags.clear();
                    body.innerHTML = `
                        <div style="margin-bottom:12px;display:flex;gap:8px;flex-wrap:wrap;">
                            <input type="text" id="errorSearch" placeholder="搜索关键词..."
                                style="flex:1;min-width:180px;padding:8px 12px;border:1px solid #ddd;border-radius:6px;font-size:14px;"
                                oninput="searchErrors()">
                            <select id="errorSeverityFilter" onchange="searchErrors()"
                                style="padding:8px;border:1px solid #ddd;border-radius:6px;font-size:14px;">
                                <option value="">全部严重程度</option>
                                <option value="critical">🔴 Critical</option>
                                <option value="warning">🟡 Warning</option>
                                <option value="info">🔵 Info</option>
                            </select>
                            <button id="errorReflectBtn" onclick="triggerErrorReflection()"
                                style="padding:8px 12px;border:none;border-radius:6px;background:#4a90d9;color:#fff;font-size:13px;cursor:pointer;">
                                🧠 触发总结
                            </button>
                        </div>
                        <div id="errorReflectStatus" style="margin:-4px 0 10px 0;font-size:12px;color:#666;"></div>
                        <div id="errorTagCloud" style="margin-bottom:12px;display:flex;gap:6px;flex-wrap:wrap;min-height:28px;"></div>
                        <div id="errorList" style="max-height:62vh;overflow-y:auto;">加载中...</div>
                    `;
                    loadErrorTags();
                    searchErrors();
                } else if (type === 'settings') {
                    title.textContent = '⚙️ 系统设置';
                    const res = await fetch('/api/v1/settings');
                    const data = await res.json();
                    const settings = data.settings || {};
                    let html = '';
                    for (const [key, info] of Object.entries(settings)) {
                        html += `<div style="margin-bottom: 20px; padding: 15px; border: 1px solid #eee; border-radius: 8px;">`;
                        html += `<div style="font-weight: bold; margin-bottom: 4px;">${info.description}</div>`;
                        html += `<div style="color: gray; font-size: 12px; margin-bottom: 8px;">key: ${key}</div>`;
                        if (info.options && info.options.length > 0) {
                            html += `<select id="setting_${key}" style="width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #ddd; font-size: 14px;">`;
                            for (const opt of info.options) {
                                const selected = opt === info.value ? 'selected' : '';
                                html += `<option value="${opt}" ${selected}>${opt}</option>`;
                            }
                            html += `</select>`;
                            // vision_model 额外显示刷新按钮和时间戳
                            if (key === 'vision_model') {
                                const lastUpdatedText = info.last_updated || '（使用内置列表）';
                                html += `
                                <div style="margin-top:8px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
                                    <span id="vision_model_updated" style="font-size:12px;color:#888;">上次刷新：${lastUpdatedText}</span>
                                    <button id="visionRefreshBtn" onclick="refreshVisionModels(event)"
                                        style="padding:4px 12px;border-radius:5px;border:1px solid #4a90d9;background:#fff;
                                               color:#4a90d9;cursor:pointer;font-size:12px;">
                                        🔄 刷新模型列表
                                    </button>
                                </div>`;
                            }
                        } else {
                            html += `<input id="setting_${key}" type="text" value="${info.value}" style="width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #ddd; font-size: 14px; box-sizing: border-box;" />`;
                        }
                        html += `<button onclick="saveSetting('${key}')" style="margin-top: 8px; padding: 6px 16px; border-radius: 6px; border: none; background: var(--primary-color); color: white; cursor: pointer; font-size: 13px;">保存</button>`;
                        html += `<span id="setting_status_${key}" style="margin-left: 10px; font-size: 12px; color: #52c41a;"></span>`;
                        html += `</div>`;
                    }
                    if (!html) html = '<p style="color: gray;">暂无可配置项。</p>';
                    body.innerHTML = html;
                }
            } catch (e) {
                body.innerHTML = `<span style="color:red">加载失败: ${e.message}</span>`;
            }
        }

        function closeModal(e) {
            document.getElementById('infoModal').style.display = 'none';
        }

        // ── Phase 8: 错题集查询 ──────────────────────────────────────────
        let selectedErrorTags = new Set();

        async function loadErrorTags() {
            try {
                const res = await fetch('/api/v1/errors/tags');
                const data = await res.json();
                const cloud = document.getElementById('errorTagCloud');
                if (!cloud) return;
                if (!data.tags || data.tags.length === 0) {
                    cloud.innerHTML = '<span style="color:#999;font-size:12px;">暂无标签</span>';
                    return;
                }
                cloud.innerHTML = data.tags.map(t =>
                    `<span onclick="toggleErrorTag('${t.name}')"
                          id="etag-${t.name}"
                          style="padding:4px 10px;border-radius:12px;font-size:12px;cursor:pointer;border:1px solid #ddd;
                                 background:${selectedErrorTags.has(t.name) ? '#4a90d9' : '#f5f5f5'};
                                 color:${selectedErrorTags.has(t.name) ? '#fff' : '#333'};">
                        ${t.name} (${t.count})
                    </span>`
                ).join('');
            } catch(e) { console.error('loadErrorTags failed:', e); }
        }

        function toggleErrorTag(tag) {
            if (selectedErrorTags.has(tag)) {
                selectedErrorTags.delete(tag);
            } else {
                selectedErrorTags.add(tag);
            }
            loadErrorTags();
            searchErrors();
        }

        async function searchErrors() {
            const search = document.getElementById('errorSearch')?.value || '';
            const severity = document.getElementById('errorSeverityFilter')?.value || '';
            const tags = Array.from(selectedErrorTags).join(',');
            const params = new URLSearchParams();
            if (search) params.set('search', search);
            if (severity) params.set('severity', severity);
            if (tags) params.set('tags', tags);

            const list = document.getElementById('errorList');
            if (!list) return;

            try {
                const res = await fetch(`/api/v1/errors/entries?${params}`);
                const data = await res.json();
                if (!data.entries || data.entries.length === 0) {
                    list.innerHTML = '<div style="text-align:center;color:#999;padding:20px;">暂无匹配的错题记录</div>';
                    return;
                }
                const sevIcon = {critical:'🔴', warning:'🟡', info:'🔵'};
                const srcLabel = {task_failure:'🤖 自动记录', auto:'🤖 AI生成', manual:'✍️ 人工录入'};
                list.innerHTML = `<div style="font-size:12px;color:#999;margin-bottom:8px;">共 ${data.total} 条记录</div>` +
                    data.entries.map(e => {
                        const icon = sevIcon[e.severity] || '⚪';
                        const tagsHtml = (e.tags||[]).map(t =>
                            `<span style="padding:2px 6px;border-radius:8px;font-size:11px;background:#e8f0fe;color:#1967d2;">${t}</span>`
                        ).join(' ');
                        const label = srcLabel[e.source] || e.source;
                        const dt = e.created_at ? new Date(e.created_at).toLocaleDateString() : '';
                        return `
                            <div style="border:1px solid #eee;padding:12px;margin-bottom:8px;border-radius:8px;cursor:pointer;"
                                 onclick="showErrorDetail('${e.id}')">
                                <div style="display:flex;justify-content:space-between;align-items:center;">
                                    <strong>${icon} ${e.title}</strong>
                                    <span style="font-size:11px;color:#999;">命中 ${e.hit_count} 次</span>
                                </div>
                                <div style="margin-top:6px;display:flex;gap:4px;flex-wrap:wrap;">${tagsHtml || '<span style="color:#ccc;font-size:11px;">无标签</span>'}</div>
                                <div style="margin-top:4px;font-size:12px;color:#999;">${label} · ${dt}</div>
                            </div>`;
                    }).join('');
            } catch(e) {
                list.innerHTML = `<span style="color:red">加载失败: ${e.message}</span>`;
            }
        }

        async function showErrorDetail(entryId) {
            const body = document.getElementById('modalBody');
            if (!body) return;
            try {
                const res = await fetch(`/api/v1/errors/entries/${entryId}`);
                const e = await res.json();
                const sevIcon = {critical:'🔴', warning:'🟡', info:'🔵'}[e.severity] || '⚪';
                const tagsHtml = (e.tags||[]).map(t =>
                    `<span style="padding:2px 8px;border-radius:8px;font-size:12px;background:#e8f0fe;color:#1967d2;">${t}</span>`
                ).join(' ');
                const esc = s => (s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;');
                body.innerHTML = `
                    <div style="margin-bottom:16px;">
                        <a href="#" onclick="searchErrors();loadErrorTags();return false;"
                           style="color:#4a90d9;text-decoration:none;font-size:13px;">← 返回列表</a>
                    </div>
                    <h3 style="margin:0 0 8px;">${sevIcon} ${esc(e.title)}</h3>
                    <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:16px;">${tagsHtml || '<span style="color:#ccc;font-size:12px;">无标签</span>'}</div>
                    <div>
                        <h4 style="color:#555;margin:0 0 6px;">📋 错误上下文</h4>
                        <pre style="white-space:pre-wrap;background:#f8f8f8;padding:12px;border-radius:6px;font-size:13px;margin:0;">${esc(e.context)}</pre>
                    </div>
                    <div style="margin-top:12px;">
                        <h4 style="color:#22863a;margin:0 0 6px;">✅ 纠正方案</h4>
                        <pre style="white-space:pre-wrap;background:#f0fff0;padding:12px;border-radius:6px;font-size:13px;margin:0;">${esc(e.correction)}</pre>
                    </div>
                    ${e.prevention ? `
                    <div style="margin-top:12px;">
                        <h4 style="color:#b08800;margin:0 0 6px;">⚠️ 预防建议</h4>
                        <pre style="white-space:pre-wrap;background:#fffde7;padding:12px;border-radius:6px;font-size:13px;margin:0;">${esc(e.prevention)}</pre>
                    </div>` : ''}
                    <div style="margin-top:16px;font-size:12px;color:#999;border-top:1px solid #eee;padding-top:8px;">
                        来源: ${e.source} · 命中次数: ${e.hit_count} · 创建: ${e.created_at ? new Date(e.created_at).toLocaleString() : '—'}
                        ${e.related_skill_ids?.length ? '<br>关联技能: ' + e.related_skill_ids.join(', ') : ''}
                        <br>ID: <span style="font-family:monospace;">${e.id}</span>
                    </div>
                `;
            } catch(err) {
                console.error('showErrorDetail failed:', err);
            }
        }

        async function triggerErrorReflection() {
            const btn = document.getElementById('errorReflectBtn');
            const statusEl = document.getElementById('errorReflectStatus');
            if (!btn || !statusEl) return;

            if (!confirm('将触发大模型对 active 原始错题进行归纳总结，并归档已解释记录。是否继续？')) {
                return;
            }

            btn.disabled = true;
            btn.style.opacity = '0.7';
            statusEl.style.color = '#666';
            statusEl.textContent = '总结中，请稍候...';

            try {
                const res = await fetch('/api/v1/errors/reflect', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        min_entries: 3,
                        max_entries: 20,
                        archive_instead_of_delete: true,
                    }),
                });

                const data = await res.json();
                if (!res.ok) {
                    throw new Error(data.detail || data.message || '触发失败');
                }

                if (data.status === 'skipped') {
                    statusEl.style.color = '#b08800';
                    statusEl.textContent = `已跳过：active 原始错题不足（当前 ${data.active_raw_count} / 需要 ${data.required}）`;
                } else {
                    statusEl.style.color = '#22863a';
                    statusEl.textContent = `完成：归纳 ${data.source_entries} 条，新增 ${data.insights_created} 条洞察，源记录已${data.source_action === 'archived' ? '归档' : '删除'}`;
                }

                selectedErrorTags.clear();
                await loadErrorTags();
                await searchErrors();
            } catch (e) {
                statusEl.style.color = '#d93025';
                statusEl.textContent = `触发失败：${e.message}`;
            } finally {
                btn.disabled = false;
                btn.style.opacity = '1';
            }
        }
        // ── Phase 8 End ──────────────────────────────────────────────────

        async function saveSetting(key) {
            const el = document.getElementById(`setting_${key}`);
            const statusEl = document.getElementById(`setting_status_${key}`);
            if (!el) return;
            const value = el.value;
            try {
                const res = await fetch(`/api/v1/settings/${key}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ value }),
                });
                if (res.ok) {
                    statusEl.textContent = '✅ 已保存';
                    statusEl.style.color = '#52c41a';
                } else {
                    const err = await res.json();
                    statusEl.textContent = `❌ ${err.detail || '保存失败'}`;
                    statusEl.style.color = '#ff4d4f';
                }
                setTimeout(() => { statusEl.textContent = ''; }, 3000);
            } catch(e) {
                statusEl.textContent = `❌ ${e.message}`;
                statusEl.style.color = '#ff4d4f';
            }
        }

        /**
         * 刷新 Vision 模型列表：向 /api/v1/settings/vision-models/refresh 发请求，
         * 用返回的最新列表更新 select 下拉并更新时间戳。
         */
        async function refreshVisionModels(evt) {
            const btn = document.getElementById('visionRefreshBtn');
            const labelEl = document.getElementById('vision_model_updated');
            if (btn) { btn.disabled = true; btn.textContent = '刷新中...'; }
            try {
                const res = await fetch('/api/v1/settings/vision-models/refresh', { method: 'POST' });
                if (!res.ok) {
                    const err = await res.json();
                    alert(`刷新失败：${err.detail || res.statusText}`);
                    return;
                }
                const data = await res.json();
                // 更新 select 下拉选项
                const sel = document.getElementById('setting_vision_model');
                if (sel) {
                    const currentVal = sel.value;
                    sel.innerHTML = '';
                    for (const m of data.models) {
                        const opt = document.createElement('option');
                        opt.value = m;
                        opt.textContent = m;
                        if (m === currentVal) opt.selected = true;
                        sel.appendChild(opt);
                    }
                }
                // 更新时间戳
                if (labelEl) labelEl.textContent = `上次刷新：${data.updated_at} （${data.count} 个模型）`;
            } catch(e) {
                alert(`刷新异常：${e.message}`);
            } finally {
                if (btn) { btn.disabled = false; btn.textContent = '🔄 刷新模型列表'; }
            }
        }

        function toggleIntentionMode() {
            isIntentionMode = !isIntentionMode;
            intentionBadge.style.display = isIntentionMode ? 'inline-block' : 'none';
            const btn = document.getElementById('intentionToggleBtn');
            btn.textContent = isIntentionMode ? '返回对话模式' : '开启任务模式';
            userInput.placeholder = isIntentionMode ? '描述你想要自动化完成的任务...' : '输入消息...';
        }

        // 从后端动态加载可用模型列表
        async function loadModels() {
            try {
                const r = await fetch('/api/v1/models');
                const data = await r.json();
                const sel = document.getElementById('modelSelect');
                sel.innerHTML = '';
                const providers = { volcengine: '🌋 火山引擎', gemini: '✨ Gemini' };
                for (const [provider, models] of Object.entries(data.available_models || {})) {
                    const grp = document.createElement('optgroup');
                    grp.label = providers[provider] || provider;
                    for (const m of models) {
                        const opt = document.createElement('option');
                        opt.value = m;
                        opt.textContent = m;
                        if (m === data.default_model) opt.selected = true;
                        grp.appendChild(opt);
                    }
                    sel.appendChild(grp);
                }
            } catch(e) {
                console.warn('Failed to load models:', e);
            }
        }

        // 任务结果轮询：收到 task_ids 后等待全部完成，在对话中回显结果
        async function pollUntilDone(taskIds, summaryMsgId) {
            const MAX_POLLS = 120; // 最多轮询 4 分钟
            let polls = 0;
            while (polls++ < MAX_POLLS) {
                await new Promise(r => setTimeout(r, 2000));
                try {
                    const res = await fetch('/api/v1/tasks');
                    const allTasks = await res.json();
                    const mine = allTasks.filter(t => taskIds.includes(t.id));
                    const pending = mine.filter(t => t.status === 'pending' || t.status === 'running');
                    const failed  = mine.filter(t => t.status === 'failed');
                    const done    = mine.filter(t => t.status === 'completed');
                    // 更新右侧面板
                    refreshTasks();
                    // 更新占位消息
                    const msgEl = document.getElementById(summaryMsgId);
                    if (!msgEl) return;
                    if (pending.length === 0) {
                        // 全部结束
                        let html = `<b>✅ 任务已全部完成（${done.length}/${mine.length} 成功）</b><br><br>`;
                        for (const t of mine) {
                            const icon = t.status === 'completed' ? '✅' : '❌';
                            const preview = t.status === 'completed' && t.result
                                ? (typeof t.result === 'string' ? t.result : JSON.stringify(t.result, null, 2)).slice(0, 300)
                                : (t.error_msg || '无输出');
                            html += `<details><summary>${icon} ${t.description.slice(0, 60)}</summary><pre style="white-space:pre-wrap;font-size:12px;margin:4px 0;">${preview.replace(/</g,'&lt;')}</pre></details>`;
                        }
                        if (failed.length > 0) html += `<br>⚠️ ${failed.length} 个任务失败，详见右侧面板。`;
                        msgEl.innerHTML = html;
                        return;
                    } else {
                        msgEl.innerHTML = `⏳ 任务进行中…（${done.length + failed.length}/${mine.length} 已完成）`;
                    }
                } catch(e) { /* ignore */ }
            }
            // 超时
            const msgEl = document.getElementById(summaryMsgId);
            if (msgEl) msgEl.innerHTML = '⚠️ 等待超时，请前往右侧面板查看进度。';
        }

        // 代理状态更新逻辑
        async function updateProxyUI() {
            try {
                const response = await fetch('/api/v1/proxy/status');
                const data = await response.json();
                const dot = document.getElementById('proxyDot');
                const text = document.getElementById('proxyText');
                const latency = document.getElementById('proxyLatency');
                const card = document.getElementById('proxyStatusCard');

                if (!dot || !text || !latency || !card) return;

                if (data.status === 'ok') {
                    dot.className = 'status-dot online';
                    text.innerText = data.node ? `代理就绪 (${data.node})` : '代理就绪';
                    latency.innerText = data.latency ? `${data.latency}ms` : '就绪';
                    card.classList.remove('error');
                    card.classList.remove('initializing');
                } else if (data.status === 'timeout') {
                    dot.className = 'status-dot offline';
                    text.innerText = '代理超时';
                    latency.innerText = 'TimeOut';
                    card.classList.add('error');
                    card.classList.remove('initializing');
                } else if (data.status === 'initializing') {
                    dot.className = 'status-dot warning';
                    text.innerText = '正在载入配置...';
                    latency.innerText = '--ms';
                    card.classList.remove('error');
                    card.classList.add('initializing');
                } else {
                    dot.className = 'status-dot offline';
                    text.innerText = '代理异常';
                    card.classList.add('error');
                    card.classList.remove('initializing');
                }
            } catch (err) {
                console.error("Failed to check proxy status:", err);
            }
        }

        // ── Phase 7: 后端驱动的会话管理 ────────────────────────────
        let currentConversationId = null;

        const chatStore = {
            activeSessionId: null,
            sessions: {}
        };

        function ensureSessionState(sessionId) {
            const key = sessionId || '__pending__';
            if (!chatStore.sessions[key]) {
                chatStore.sessions[key] = {
                    generation: 'idle',
                    lastUserContent: null,
                    lastUserModel: null,
                    lastLoadingId: null,
                };
            }
            return chatStore.sessions[key];
        }

        function getActiveSessionState() {
            return ensureSessionState(chatStore.activeSessionId || currentConversationId || '__pending__');
        }

        function setActiveSession(sessionId) {
            chatStore.activeSessionId = sessionId || '__pending__';
            ensureSessionState(chatStore.activeSessionId);
        }

        function _logStateTransition(nextState, reason = '') {
            const sid = chatStore.activeSessionId || currentConversationId || '__pending__';
            console.log('[chat-state]', { sessionId: sid, nextState, reason });
        }

        function setGenerationState(nextState, reason = '') {
            const state = getActiveSessionState();
            state.generation = nextState;

            if (nextState === 'streaming') {
                _generating = true;
                userInput.disabled = true;
                sendBtn.disabled = false;
                sendBtn.classList.add('stopping');
                sendBtn.textContent = '● 停止';
            } else if (nextState === 'stopping') {
                _generating = true;
                userInput.disabled = true;
                sendBtn.disabled = false;
                sendBtn.classList.add('stopping');
                sendBtn.textContent = '⏹ 停止中...';
            } else {
                _generating = false;
                userInput.disabled = false;
                sendBtn.disabled = false;
                sendBtn.classList.remove('stopping');
                sendBtn.innerHTML = SEND_BTN_DEFAULT_HTML;
            }

            _logStateTransition(nextState, reason);
            refreshMessageActionBars();
        }

        // C-1: 从 API 加载对话列表，渲染到左侧历史栏

        // C-1: 新建对话（向后端请求）
        async function createNewChat() {
            try {
                stopGeneration();
                resetGenerationState();
                const res = await fetch('/api/v1/conversations', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title: '新对话', model: modelSelect.value || 'ark-code-latest' })

                currentConversationId = conv.id;
                setActiveSession(conv.id);
                localStorage.setItem('wateryLastConversationId', conv.id);
                chatTitle.textContent = conv.title || '新对话';
                chatMessages.innerHTML = '';

                renderAttachmentPreview();

                console.error('createNewChat failed:', e);
            }
        }

        // C-1: 加载一个对话（从后端拉取完整消息列表）
        async function loadChat(convId) {
            if (!convId) return;
            stopGeneration();
            resetGenerationState();
            currentConversationId = convId;
            setActiveSession(convId);
            localStorage.setItem('wateryLastConversationId', convId);
            chatMessages.innerHTML = '';
            chatTitle.textContent = '加载中...';
            pendingAttachments = [];
            renderAttachmentPreview();
            try {
                const res = await fetch(`/api/v1/conversations/${convId}`);
                if (!res.ok) { showWelcomeMessage(); return; }
                const data = await res.json();
                chatTitle.textContent = data.title || '对话';
                const messages = data.messages || [];
                if (messages.length === 0) {
                    showWelcomeMessage();
                } else {
                    for (const msg of messages) {
                        if (msg.role === 'system') continue; // 不显示系统消息
                        if (msg.role === 'tool') continue;   // 工具回复不单独显示
                        // C-3: 处理历史中的 tool_calls（OpenAI 格式 → 展示卡片）
                        let displayToolCalls = null;
                        const rawToolCalls = msg.tool_calls;
                        if (rawToolCalls) {
                            try {

        // C-4: 迁移 localStorage 历史到后端

            let oldChats;
            try { oldChats = JSON.parse(raw); } catch { localStorage.removeItem('wateryChats'); return; }

            if (chatIds.length === 0) { localStorage.removeItem('wateryChats'); return; }
            console.log(`正在迁移 ${chatIds.length} 个历史对话到后端...`);
            for (const chatId of chatIds) {

                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ title: chat.title || '迁移对话', model: 'ark-code-latest' })

        let pendingAttachments = []; // [{type:'image'|'text', name, content, mimeType?}]

        /**
         * 处理用户选择的文件列表：
         * - 图片   → 浏览器端转 base64 data URL（无需上传服务器）
         * - .txt/.md → FileReader 读取文本（无需上传）
         * - PDF/DOCX → 上传到 /api/v1/chat/upload 进行服务器端提取
         */
        async function handleFileAttach(event) {
            const files = Array.from(event.target.files);
            event.target.value = ''; // 允许重复选择同一文件
            await processFiles(files);
        }

        async function processFiles(files) {
            const MAX_SIZE = 20 * 1024 * 1024; // 20 MB

            for (const file of files) {
                if (file.size > MAX_SIZE) {
                    alert(`"《${file.name}》"超过 20 MB 限制，已跳过。`);
                    continue;
                }
                try {
                    if (file.type.startsWith('image/')) {
                        const dataUrl = await _readAsDataURL(file);
                        pendingAttachments.push({ type: 'image', name: file.name, content: dataUrl, mimeType: file.type });
                        renderAttachmentPreview();
                    } else if (file.type.startsWith('text/') || /\.(txt|md|csv|log)$/i.test(file.name)) {
                        const text = await _readAsText(file);
                        pendingAttachments.push({ type: 'text', name: file.name, content: text });
                        renderAttachmentPreview();
                    } else {
                        // PDF / DOCX —— 上传到后端提取文本
                        const chipId = 'chip-loading-' + Date.now();
                        _showLoadingChip(file.name, chipId);
                        const formData = new FormData();
                        formData.append('file', file);
                        const res = await fetch('/api/v1/chat/upload', { method: 'POST', body: formData });
                        pendingAttachments = pendingAttachments.filter(att => att.id !== chipId);
                        renderAttachmentPreview();
                        if (!res.ok) {
                            const err = await res.json().catch(() => ({}));
                            alert(`处理《${file.name}》失败：${err.detail || res.statusText}`);
                            continue;
                        }
                        const data = await res.json();
                        pendingAttachments.push({ type: 'text', name: data.name, content: data.content, file_path: data.file_path });
                        renderAttachmentPreview();
                    }
                } catch (e) {
                    alert(`附件处理异常：${e.message}`);
                }
            }
        }

        function _showLoadingChip(name, id) {
            pendingAttachments.push({ type: 'loading', name, id });
            renderAttachmentPreview();
        }

        function _readAsDataURL(file) {
            return new Promise((resolve, reject) => {
                const r = new FileReader();
                r.onload = e => resolve(e.target.result);
                r.onerror = reject;
                r.readAsDataURL(file);
            });
        }

        function _readAsText(file) {
            return new Promise((resolve, reject) => {
                const r = new FileReader();
                r.onload = e => resolve(e.target.result);
                r.onerror = reject;
                r.readAsText(file, 'UTF-8');
            });
        }

                        <button class="chip-remove" onclick="removeAttachment(${i})" title="移除">&times;</button>
                    </div>`;
                }
                const icon = /\.pdf$/i.test(att.name) ? '📄' : /\.docx?$/i.test(att.name) ? '📝' : '📃';
                const sz = (att.content || '').length >= 1000
                    ? `${Math.round(att.content.length / 1000)}K字`

                return `<div class="attachment-chip">
                    <span>${icon}</span>

        function parseSSEEvents(buffer, onParseError) {
            const events = [];
            let rest = buffer;

            while (true) {
                const frameEnd = rest.indexOf('\n\n');
                if (frameEnd === -1) break;

                const frame = rest.slice(0, frameEnd);
                rest = rest.slice(frameEnd + 2);

                if (!frame.trim()) continue;

                const dataLines = frame
                    .split('\n')
                    .filter(line => line.startsWith('data:'))
                    .map(line => line.slice(5).trimStart());

                if (!dataLines.length) continue;

                const payload = dataLines.join('\n').trim();
                if (!payload) continue;

                try {
                    events.push(JSON.parse(payload));
                } catch (err) {
                    if (onParseError) onParseError(err, payload);
                }
            }

            return { events, rest };
        }

        function normalizeStreamEvent(rawEvent) {
            if (!rawEvent || typeof rawEvent !== 'object') return null;
            const type = rawEvent.event || rawEvent.type;
            if (!type) return null;

            if (type === 'text_delta') {
                return { type, delta: rawEvent.delta || '' };
            }
            if (type === 'tool_start') {
                return {
                    type,
                    tool_name: rawEvent.tool_name || 'unknown_tool',
                    tool_call_id: rawEvent.tool_call_id || rawEvent.call_id || '',
                };
            }
            if (type === 'tool_result') {
                return {
                    type,
                    tool_name: rawEvent.tool_name || 'unknown_tool',
                    tool_call_id: rawEvent.tool_call_id || rawEvent.call_id || '',
                    ok: Boolean(rawEvent.ok),
                    result: rawEvent.result,
                };
            }
            if (type === 'usage') {
                return { type, usage: rawEvent.usage || {} };
            }
            if (type === 'done') {
                return {
                    type,
                    content: rawEvent.content || '',
                    finish_reason: rawEvent.finish_reason || 'stop',
                };
            }
            if (type === 'error') {
                return {
                    type,
                    message: rawEvent.message || rawEvent.error || '未知错误',
                };
            }
            return null;
        }

        function copyMessage(msgDiv) {

        // C-2: 新版 sendMessage — 只发单条用户消息 + conversation_id，历史由后端管理
        async function sendMessage() {
            const text = userInput.value.trim();
            const hasAttachments = pendingAttachments.length > 0;
            if (!text && !hasAttachments) return;

            const state = getActiveSessionState();
            if (state.generation === 'streaming' || state.generation === 'stopping') return;

            // 快照并清空附件列表
            const attachmentsSnap = [...pendingAttachments];
            pendingAttachments = [];
            renderAttachmentPreview();

            // 构建发送给 LLM 的 content：纯文本 or 多模态数组
            const imgAttachments = attachmentsSnap.filter(a => a.type === 'image');
            const textAttachments = attachmentsSnap.filter(a => a.type === 'text');

            let fullText = text;
            for (const tf of textAttachments) {
                const excerpt = tf.content.length > 8000
                    ? tf.content.substring(0, 8000) + '\n…(内容过长，已截断)'
                    : tf.content;
                // 如果后端已保存文件到磁盘，将路径告知 AI
                const pathHint = tf.file_path ? `\n文件已保存到: ${tf.file_path}` : '';
                fullText += `\n\n---\n[附件：${tf.name}]${pathHint}\n\`\`\`\n${excerpt}\n\`\`\``;
            }

            let messageContent;
            if (imgAttachments.length > 0) {
                // 多模态消息（需要支持 Vision 的模型，如 gemini-2.5-flash）
                const parts = [];
                if (fullText.trim()) parts.push({ type: 'text', text: fullText });
                for (const img of imgAttachments) {
                    parts.push({ type: 'image_url', image_url: { url: img.content } });
                }
                messageContent = parts;
            } else {
                messageContent = fullText || '';
            }

            userInput.value = '';
            setGenerationState('streaming', 'sendMessage:start');
            
            // 保存快照用于重试
            _lastUserContent = messageContent;
            _lastUserModel = modelSelect.value;
            state.lastUserContent = messageContent;
            state.lastUserModel = modelSelect.value;

            // 渲染用户消息（含附件预览）
            appendUserMessage(text, attachmentsSnap);

            const loadingId = 'loading-' + Date.now();
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message assistant';
            loadingDiv.id = loadingId;
            loadingDiv.textContent = isIntentionMode ? '正在拆解并分发任务...' : '思考中...';
            chatMessages.appendChild(loadingDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            _lastLoadingId = loadingId;
            state.lastLoadingId = loadingId;

            try {
                if (isIntentionMode) {
                    const response = await fetch('/api/v1/intention', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ intention: text })
                    });
                    const data = await response.json();
                    document.getElementById(loadingId)?.remove();
                    if (response.ok && data.status === 'success' && data.task_ids?.length > 0) {
                        const summaryId = 'task-summary-' + Date.now();
                        const container = document.createElement('div');
                        container.className = 'message assistant';
                        container.id = summaryId;
                        container.textContent = `⏳ 已分配 ${data.task_ids.length} 个子任务，等待执行中...`;
                        chatMessages.appendChild(container);
                        chatMessages.scrollTop = chatMessages.scrollHeight;
                        pollUntilDone(data.task_ids, summaryId);
                        refreshTasks();
                    } else {
                        appendMessage('assistant', `✅ 任务已发送。${data.message || ''}`);
                    }
                } else {
                    // 确保有当前对话
                    if (!currentConversationId) {
                        await createNewChat();
                    }
                    // 创建 AbortController 用于停止请求
                    _activeController = new AbortController();
                    
                    const response = await fetch('/api/v1/chat/stream', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            conversation_id: currentConversationId,
                            messages: [{ role: 'user', content: messageContent }],
                            model: modelSelect.value
                        }),
                        signal: _activeController.signal
                    });

                    if (!response.ok) {
                        const err = await response.json();
                        throw new Error(err.detail || '请求失败');
                    }

                    // 开始消费 SSE
                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();
                    let sseBuffer = '';
                    let assistantMessageDiv = null;
                    let textContentSpan = null;
                    let toolCardsContainer = null;
                    let fullText = "";

                    // 移除 "思考中..."
                    document.getElementById(loadingId)?.remove();

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;

                        sseBuffer += decoder.decode(value, { stream: true });
                        const parsed = parseSSEEvents(sseBuffer, (err, payload) => {
                            console.error('Error parsing SSE event:', err, payload);
                        });
                        sseBuffer = parsed.rest;

                        for (const event of parsed.events) {
                            const normalizedEvent = normalizeStreamEvent(event);
                            if (!normalizedEvent) continue;

                            if (normalizedEvent.type === 'text_delta') {
                                if (!assistantMessageDiv) {
                                    assistantMessageDiv = document.createElement('div');
                                    assistantMessageDiv.className = 'message assistant';
                                    textContentSpan = document.createElement('span');
                                    textContentSpan.className = 'stream-text';
                                    assistantMessageDiv.appendChild(textContentSpan);
                                    chatMessages.appendChild(assistantMessageDiv);
                                }
                                fullText += normalizedEvent.delta;
                                textContentSpan.textContent = fullText;
                                chatMessages.scrollTop = chatMessages.scrollHeight;
                            }
                            else if (normalizedEvent.type === 'tool_start') {
                                if (!toolCardsContainer) {
                                    toolCardsContainer = document.createElement('div');
                                    toolCardsContainer.className = 'tool-cards-container';
                                    if (assistantMessageDiv) {
                                        assistantMessageDiv.insertBefore(toolCardsContainer, textContentSpan);
                                    } else {
                                        assistantMessageDiv = document.createElement('div');
                                        assistantMessageDiv.className = 'message assistant';
                                        assistantMessageDiv.appendChild(toolCardsContainer);
                                        chatMessages.appendChild(assistantMessageDiv);
                                    }
                                }
                                const card = document.createElement('div');
                                card.className = 'tool-call-card pending';
                                card.id = `tool-${normalizedEvent.tool_call_id}`;
                                card.innerHTML = `⏳ 正在调用工具: <strong>${normalizedEvent.tool_name}</strong>...`;
                                toolCardsContainer.appendChild(card);
                                chatMessages.scrollTop = chatMessages.scrollHeight;
                            }
                            else if (normalizedEvent.type === 'tool_result') {
                                const card = document.getElementById(`tool-${normalizedEvent.tool_call_id}`);
                                if (card) {
                                    card.className = normalizedEvent.ok ? 'tool-call-card success' : 'tool-call-card error';
                                    card.innerHTML = `${normalizedEvent.ok ? '🔧' : '❌'} 工具 <strong>${normalizedEvent.tool_name}</strong> 执行${normalizedEvent.ok ? '成功' : '失败'}`;
                                    card.title = JSON.stringify(normalizedEvent.result, null, 2);
                                }
                            }
                            else if (normalizedEvent.type === 'usage') {
                                console.log('Stream usage:', normalizedEvent.usage);
                            }
                            else if (normalizedEvent.type === 'done') {
                                console.log('Stream finished:', normalizedEvent);
                                if (assistantMessageDiv) {
                                    assistantMessageDiv.dataset.actionable = '1';
                                    refreshMessageActionBars();
                                }
                                setGenerationState('idle', 'stream:done');
                            }
                            else if (normalizedEvent.type === 'error') {
                                appendMessage('assistant', `❌ 错误: ${normalizedEvent.message}`);
                                setGenerationState('error', 'stream:error');
                            }
                        }
                    }
                }
            } catch (error) {
                if (error.name === 'AbortError') {
                    // 用户主动停止
                    const loadingDiv = document.getElementById(loadingId);
                    if (loadingDiv) {
                        loadingDiv.innerHTML = '<span class="stopped-badge">⏸ 已停止</span>';
                    }
                    setGenerationState('idle', 'sendMessage:abort');
                } else {
                    document.getElementById(loadingId)?.remove();
                    appendMessage('assistant', `❌ 网络错误: ${error.message}`);
                    setGenerationState('error', 'sendMessage:network-error');
                }
            } finally {
                resetGenerationState();
                userInput.focus();
            }
        }
        // ── 拖放上传支持 ─────────────────────────────────────────
        // 防止浏览器默认拖放导航行为（导致页面跳转）
        document.addEventListener('dragover', e => e.preventDefault());
        document.addEventListener('drop', e => e.preventDefault());

        (function initDragDrop() {
            const container = document.querySelector('.chat-input-container');
            if (!container) return;

            container.addEventListener('dragenter', e => {
                e.preventDefault();
                container.classList.add('drag-over');
            });

            container.addEventListener('dragover', e => {
                e.preventDefault();
                e.stopPropagation();
                container.classList.add('drag-over');
            });

            container.addEventListener('dragleave', e => {
                // 只有鼠标完全离开容器时才移除高亮
                if (!container.contains(e.relatedTarget)) {
                    container.classList.remove('drag-over');
                }
            });

            container.addEventListener('drop', async e => {
                e.preventDefault();
                e.stopPropagation();
                container.classList.remove('drag-over');
                const files = Array.from(e.dataTransfer.files);
                if (files.length) await processFiles(files);
            });

            // 对话区也支持拖入（指向同一处理逻辑）
            const chatArea = document.getElementById('chatMessages');
            if (chatArea) {
                chatArea.addEventListener('dragover', e => {
                    e.preventDefault();
                    container.classList.add('drag-over');
                });
                chatArea.addEventListener('dragleave', e => {
                    if (!container.contains(e.relatedTarget) && !chatArea.contains(e.relatedTarget)) {
                        container.classList.remove('drag-over');
                    }
                });
                chatArea.addEventListener('drop', async e => {
                    e.preventDefault();
                    container.classList.remove('drag-over');
                    const files = Array.from(e.dataTransfer.files);
                    if (files.length) await processFiles(files);
                });
            }
        })();
    </script>
</body>
</html>
